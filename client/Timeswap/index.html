<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>換時機 Time Swap</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme-dark.css">
    <style>
        /* --- 按鈕載入中動畫與狀態 --- */
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .icon-spin {
            animation: spin 1s linear infinite;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed !important;
        }

        .task-checkbox:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <!-- 載入中畫面 -->
    <div id="loader">載入資料中...</div>

    <!-- 視圖 1：入口角色切換 (預設顯示) -->
    <div id="view-entry" class="app-container entry-container">
        <header class="header">
            <h1>換時機</h1>
            <p>Time Swap</p>
        </header>

        <!-- 中央角色清單 -->
        <main class="role-container" id="role-container">
            <!-- 角色清單將由 JS 動態載入 -->
        </main>

        <!-- 底部切換主題按鈕 -->
        <button id="btn-theme-toggle" class="theme-btn" onclick="toggleTheme()" aria-label="切換主題">
            <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                style="display: none;">
                <path fill="currentColor"
                    d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5s5-2.24 5-5s-2.24-5-5-5m0 8c-1.65 0-3-1.35-3-3s1.35-3 3-3s3 1.35 3 3s-1.35 3-3 3m0-13c-.55 0-1 .45-1 1v2c0 .55.45 1 1 1s1-.45 1-1V3c0-.55-.45-1-1-1m0 18c-.55 0-1 .45-1 1v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1m8-11h-2c-.55 0-1 .45-1 1s.45 1 1 1h2c.55 0 1-.45 1-1s-.45-1-1-1M5 12c0-.55-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1h2c.55 0 1-.45 1-1m14.36-6.95l-1.41-1.41a.996.996 0 1 0-1.41 1.41l1.41 1.41c.39.39 1.02.39 1.41 0c.38-.39.38-1.03 0-1.41M5.64 18.36l-1.41-1.41a.996.996 0 1 0-1.41 1.41l1.41 1.41c.39.39 1.02.39 1.41 0c.38-.39.38-1.03 0-1.41m12.72 1.41l1.41-1.41a.996.996 0 1 0-1.41-1.41l-1.41 1.41c-.39.39-.39 1.02 0 1.41c.39.38 1.03.38 1.41 0M7.05 5.64L5.64 4.23a.996.996 0 1 0-1.41 1.41l1.41 1.41c.39.39 1.02.39 1.41 0c.38-.39.38-1.03 0-1.41" />
            </svg>
            <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                <path fill="currentColor"
                    d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9s9-4.03 9-9c0-.46-.04-.92-.1-1.36c-.98 1.37-2.58 2.26-4.4 2.26c-2.98 0-5.4-2.42-5.4-5.4c0-1.81.89-3.42 2.26-4.4C12.92 3.04 12.46 3 12 3" />
            </svg>
        </button>

        <!-- 底部管理按鈕 -->
        <button id="btn-admin-login" class="admin-btn" onclick="promptAdminPassword()" aria-label="家長管理頁">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                <path fill="currentColor"
                    d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5s3.5 1.57 3.5 3.5s-1.57 3.5-3.5 3.5z" />
            </svg>
        </button>
    </div>

    <!-- 視圖 2：個人任務頁面 (預設隱藏) -->
    <div id="view-task" class="app-container" style="display: none;">
        <!-- 頂部導覽列 -->
        <header class="navbar">
            <button id="btn-back" class="btn-back" onclick="reloadPageSafely()">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path fill="currentColor" d="m12 20l-8-8l8-8l1.425 1.4l-5.6 5.6H20v2H7.825l5.6 5.6z" />
                </svg>
            </button>
            <div class="member-name" id="member-name">載入中...</div>
            <div class="avatar">
                <!-- 預設頭像 -->
                <img src="https://robohash.org/Felix?set=set4" alt="頭像" id="member-avatar">
            </div>
        </header>

        <!-- 核心數據看板 -->
        <section id="section-dashboard" class="dashboard">
            <div class="time-card">
                <div class="label">可用 3C 時間</div>
                <div class="value-container">
                    <span class="value" id="available-time">--</span>
                    <span class="unit">分鐘</span>
                </div>
            </div>
        </section>

        <!-- 今日家事列表 -->
        <section id="section-task-list" class="task-section">
            <h2 class="section-title">今日家事列表 (Daily Tasks)</h2>
            <ul class="task-list" id="task-list">
                <!-- 任務項目會由 JavaScript 動態產生 -->
            </ul>
        </section>

        <!-- 底部區域 -->
        <footer id="section-footer" class="footer">
            <div class="accumulated-text">
                今日累計已獲得：<span id="accumulated-time">--</span> 分鐘
            </div>
            <button id="btn-start-3c" class="btn-start" onclick="toggleTimer()">開啟 3C 時間</button>
        </footer>
    </div> <!-- end view-task -->

    <!-- 視圖 3：家長管理後台 (預設隱藏) -->
    <div id="view-admin" class="admin-container" style="display: none;">
        <header class="admin-header">
            <button class="btn-home" onclick="reloadPageSafely()" aria-label="回到首頁">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3L2 12h3v8z" />
                </svg>
            </button>
            <h1>家長管理後台</h1>
        </header>

        <!-- Tab 標籤列 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-tasks', this)">家事管理</button>
            <button class="tab-btn" onclick="switchTab('tab-adjust', this)">時間調整</button>
            <button class="tab-btn" onclick="switchTab('tab-stats', this)">LOG記錄</button>
            <button class="tab-btn" onclick="switchTab('tab-members', this)">成員管理</button>
        </div>

        <!-- 分頁 A：家事管理 -->
        <main id="tab-tasks" class="tab-content active">
            <div class="card">
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label for="new-task-name">家事名稱</label>
                        <input type="text" id="new-task-name" class="form-control" placeholder="例如：拖地">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="new-task-reward">分鐘</label>
                        <input type="number" id="new-task-reward" class="form-control" min="1" placeholder="15">
                    </div>
                    <button class="btn btn-primary" onclick="addTask(this)">新增</button>
                </div>
            </div>
            <div class="card">
                <ul class="admin-task-list" id="admin-task-list">
                    <!-- 任務列表由 JS 動態產生 -->
                </ul>
            </div>
        </main>

        <!-- 分頁 B：時間調整 -->
        <main id="tab-adjust" class="tab-content">
            <div class="card">
                <div class="form-group">
                    <label for="adjust-member">選擇孩子</label>
                    <select id="adjust-member" class="form-control">
                        <!-- 選項由 JS 動態產生 -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="adjust-minutes">增減分鐘 (可輸入負數)</label>
                    <input type="number" id="adjust-minutes" class="form-control" placeholder="例如：10 或 -15">
                </div>
                <div class="form-group">
                    <label for="adjust-reason">調整原因</label>
                    <input type="text" id="adjust-reason" class="form-control" placeholder="例如：考試優異獎勵、未收玩具懲罰">
                </div>
                <button class="btn btn-primary btn-block" style="margin-top: 10px;"
                    onclick="submitAdjustment(this)">確認送出</button>
            </div>
        </main>

        <!-- 分頁 C：LOG記錄 -->
        <main id="tab-stats" class="tab-content">
            <div class="card">
                <h3 style="margin-bottom: 16px; font-size: 1.1rem;">系統活動紀錄</h3>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>時間</th>
                                <th>成員</th>
                                <th>變更</th>
                                <th>原因</th>
                            </tr>
                        </thead>
                        <tbody id="stats-table-body">
                            <!-- 統計資料由 JS 動態產生 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- 分頁 D：成員管理 -->
        <main id="tab-members" class="tab-content">
            <div class="card">
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label for="new-member-name">小朋友姓名</label>
                        <input type="text" id="new-member-name" class="form-control" placeholder="例如：Cooper">
                    </div>
                    <button class="btn btn-primary" onclick="addMember(this)">新增</button>
                </div>
            </div>
            <div class="card">
                <ul class="admin-task-list" id="admin-member-list">
                    <!-- 成員列表由 JS 動態產生 -->
                </ul>
            </div>
        </main>
    </div> <!-- end view-admin -->

    <script>
        // 設定你的 Google Apps Script Web App URL
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzlHW96hEppgLs3tbmYQxXHcgYM4EI3vyIZVqzjmJF98hpvhf0YD8sL54lXlBNSjP4/exec';
        const API_KEY = 'TQ-2026-STRICT-AUTH';

        // 使用者狀態模型 (提供假資料做為開發與錯誤時的預設值)
        let memberData = {
            id: 'user_01',
            name: '小明',
            availableTime: 120,
            accumulatedTime: 45,
            tasks: [
                { id: 't1', name: '整理房間', reward: 15, completed: false },
                { id: 't2', name: '洗碗', reward: 20, completed: true },
                { id: 't3', name: '寫完功課', reward: 30, completed: false }
            ]
        };

        // --- 計時器全域變數 ---
        const memberTimers = {}; // { [memberId]: { timeRemaining: number, isRunning: boolean } }
        let masterInterval = null;
        let lastTickTime = null; // 用來計算真實經過的秒數，避免背景降頻導致計時不準

        // --- 通用 UI 輔助函式：設定按鈕載入狀態 ---
        function setButtonLoading(btn, isLoading) {
            if (!btn) return;
            if (isLoading) {
                btn.disabled = true;
                if (btn.dataset.originalHtml === undefined) {
                    btn.dataset.originalHtml = btn.innerHTML;
                }
                const spinnerSvg = `<svg class="icon-spin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M12 21q-3.45 0-6.012-2.287T3.05 13H5.1q.35 2.6 2.313 4.3T12 19q2.925 0 4.963-2.037T19 12t-2.037-4.962T12 5q-1.725 0-3.225.8T6.25 8H9v2H3V4h2v2.35q1.275-1.6 3.113-2.475T12 3q1.875 0 3.513.713t2.85 1.924t1.925 2.85T21 12t-.712 3.513t-1.925 2.85t-2.85 1.925T12 21"/></svg>`;

                if (btn.classList.contains('btn-icon')) {
                    btn.innerHTML = spinnerSvg;
                } else {
                    const originalText = btn.textContent.trim();
                    btn.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; gap: 8px;">${spinnerSvg}<span>${originalText}</span></div>`;
                }
            } else {
                btn.disabled = false;
                if (btn.dataset.originalHtml !== undefined) btn.innerHTML = btn.dataset.originalHtml;
            }
        }

        // --- 安全重新載入頁面 (防止重整時遺失未同步秒數) ---
        function reloadPageSafely() {
            // 多裝置同步已交由伺服器精準結算，可直接重整
            window.location.reload();
        }

        // --- 視圖切換邏輯 ---
        function switchView(viewId) {

            document.getElementById('view-entry').style.display = (viewId === 'view-entry') ? 'flex' : 'none';
            document.getElementById('view-task').style.display = (viewId === 'view-task') ? 'flex' : 'none';
            document.getElementById('view-admin').style.display = (viewId === 'view-admin') ? 'flex' : 'none';

            // 平滑切換背景色：如果是入口就用黑夜背景，個人頁用明亮背景
            if (viewId === 'view-entry') {
                document.body.style.backgroundColor = 'var(--entry-bg-body)';
                renderEntryRoles(); // 刷新角色狀態 (顯示背景計時器圖示)
            } else if (viewId === 'view-admin') {
                document.body.style.backgroundColor = 'var(--admin-bg-body)';
            } else {
                document.body.style.backgroundColor = 'var(--bg-body)';
            }
        }

        // --- 點擊角色，動態載入任務 ---
        function openTaskView(userName) {
            // 更新目前使用者資料
            memberData.name = userName;
            memberData.id = userName; // 修正：保持原本的大小寫 (例如 Cooper)，以符合 Google Sheet 裡的 MemberID

            // 更新頭像
            document.getElementById('member-avatar').src = `https://robohash.org/${userName}?set=set4`;

            switchView('view-task');

            // 呼叫 API 讀取該角色的真實資料
            fetchMemberData();
        }

        // 畫面載入後初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化主題
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.body.classList.add('dark-mode');
                document.getElementById('icon-moon').style.display = 'none';
                document.getElementById('icon-sun').style.display = 'block';
            }

            // 預設顯示「角色切換入口」
            switchView('view-entry');
            fetchInitialData(); // 載入全域資料並動態產生首頁角色

            // 啟動多裝置狀態同步輪詢
            setInterval(pollTimers, 5000);
        });

        // 1. 取得最新狀態 (GET)
        async function fetchMemberData() {
            showLoader(true);
            try {
                console.log(`⏳ 開始讀取 ${memberData.name} 的資料...`);
                // 呼叫 GAS，帶上 action=getChildDashboard 與對應的 memberId
                const response = await fetch(`${GAS_API_URL}?action=getChildDashboard&memberId=${memberData.id}`, {
                    method: "GET",
                    redirect: "follow"
                });

                if (!response.ok) throw new Error('網路回應錯誤');

                const result = await response.json();
                if (result.success === false) {
                    throw new Error(result.message);
                }

                console.log("✅ 成功讀取資料:", result);

                // 將 GAS 回傳的資料結構映射到前端，並加上防呆機制
                if (result.memberInfo) {
                    memberData.id = result.memberInfo.MemberID; // 關鍵：將後端回傳的唯一 ID 存起來
                    // 支援不同命名欄位 (Name/姓名, TotalTime/可用時間)
                    memberData.name = result.memberInfo.Name || result.memberInfo.姓名 || memberData.name;
                    memberData.availableTime = Number(result.memberInfo.TotalTime || result.memberInfo['可用時間']) || 0;

                    if (!memberTimers[memberData.id]) {
                        memberTimers[memberData.id] = {
                            timeRemaining: Math.round(memberData.availableTime * 60),
                            isRunning: false
                        };
                    }

                    const timerInfo = result.timer || { isRunning: false };
                    if (timerInfo.isRunning && timerInfo.startTime) {
                        const elapsedSeconds = Math.max(0, Math.floor((result.serverNow - timerInfo.startTime) / 1000));
                        memberTimers[memberData.id].timeRemaining = Math.max(0, Math.round(memberData.availableTime * 60) - elapsedSeconds);
                        memberTimers[memberData.id].isRunning = true;
                    }
                }
                memberData.accumulatedTime = Number(result.todayEarned) || 0;

                memberData.tasks = result.dailyTasks.map(t => ({
                    id: t.TaskID,
                    name: t.TaskName || t.Name, // 支援不同命名的 Sheet 欄位
                    reward: Number(t.Reward || t.reward || 0),
                    completed: (t.status == 1 || t.status === true || t.status === 'TRUE')
                }));

                renderUI();
            } catch (error) {
                console.error('取得資料失敗:', error);
                alert(`載入失敗：${error.message}\n(請確認 Sheet 設定或重新部署 GAS)`);
            } finally {
                showLoader(false);
            }
        }

        // 2. 渲染 UI
        function renderUI() {
            // 更新基本資訊
            document.getElementById('member-name').textContent = memberData.name;
            updateTimerDisplay(); // 改由計時器顯示邏輯接管
            updateTimerUIState(); // 更新按鈕狀態
            document.getElementById('accumulated-time').textContent = memberData.accumulatedTime;

            // 渲染任務列表
            const taskListEl = document.getElementById('task-list');
            taskListEl.innerHTML = '';

            memberData.tasks.forEach(task => {
                const li = document.createElement('li');
                li.id = `task-item-${task.id}`;
                li.className = `task-item ${task.completed ? 'completed' : ''}`;

                li.innerHTML = `
                    <div class="task-info">
                        <div id="task-name-${task.id}" class="task-name">${task.name}</div>
                        <div id="task-reward-${task.id}" class="task-reward">+${task.reward} 分鐘</div>
                    </div>
                    <input type="checkbox" id="checkbox-${task.id}" class="task-checkbox" 
                           ${task.completed ? 'checked' : ''} 
                           ${task.isSyncing ? 'disabled' : ''}
                           onchange="handleTaskToggle('${task.id}', this.checked)">
                `;
                taskListEl.appendChild(li);
            });
        }

        // 3. 處理核取方塊切換 (POST)
        async function handleTaskToggle(taskId, isCompleted) {
            const task = memberData.tasks.find(t => t.id === taskId);
            if (task) task.isSyncing = true; // 鎖定狀態，防呆

            // 樂觀 UI 更新 (Optimistic UI update) - 先更新畫面，讓使用者感覺操作即時
            updateLocalTaskState(taskId, isCompleted);
            renderUI();

            try {
                // 背景非同步同步資料至 Google Sheets
                // 注意：GAS POST 請求若有 CORS 問題，有時建議使用 'text/plain' 格式處理 payload
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: {
                        // 💡 改用 text/plain 可以避免 GAS 觸發 CORS 預檢請求 (OPTIONS) 錯誤
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify({
                        apiKey: 'TQ-2026-STRICT-AUTH', // 帶入後端驗證密碼
                        action: 'updateTask',          // 告訴後端這次要做什麼動作
                        memberId: memberData.id,
                        taskId: taskId,
                        status: isCompleted ? 1 : 0,   // 將 boolean 轉為 1 或 0 傳給後端
                        timestamp: new Date().toISOString()
                    })
                });

                if (!response.ok) throw new Error('同步失敗');
                const result = await response.json();
                if (result.success === false) throw new Error(result.message || '後端回傳失敗');

                console.log('任務狀態已成功同步至 Google Sheets');

            } catch (error) {
                console.error('同步至 Google Sheets 失敗:', error);
                alert('網路連線不穩，狀態未確實儲存，系統將重置狀態。');

                // 若後端同步失敗，還原在地端的 UI 狀態
                updateLocalTaskState(taskId, !isCompleted);
                renderUI();
            }
        }

        // 輔助函式：更新本地資料模型與時間計算
        function updateLocalTaskState(taskId, isCompleted) {
            const task = memberData.tasks.find(t => t.id === taskId);
            if (!task) return;

            task.completed = isCompleted;

            const timer = memberTimers[memberData.id];

            // 動態增減 3C 時間 (此邏輯依據你的商業需求可調整)
            if (isCompleted) {
                memberData.accumulatedTime += task.reward;
                memberData.availableTime += task.reward;
                if (timer) timer.timeRemaining += task.reward * 60; // 計時器秒數同步增加
            } else {
                memberData.accumulatedTime -= task.reward;
                memberData.availableTime -= task.reward;
                if (timer) timer.timeRemaining -= task.reward * 60; // 計時器秒數同步扣除
            }
            updateTimerDisplay(); // 更新畫面上的可用時間
        }

        // ==========================================
        // 核心計時器邏輯 (支援多成員獨立計時與異步結算)
        // ==========================================

        function updateTimerDisplay() {
            const timer = memberTimers[memberData.id];
            if (!timer) return;

            // 計算分與秒，用於畫面顯示 (例如 12:34)
            const minutes = Math.floor(timer.timeRemaining / 60);
            const seconds = Math.floor(timer.timeRemaining % 60);
            document.getElementById('available-time').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // 隱藏「分鐘」單位字樣以適應 MM:SS 格式
            const unitEl = document.querySelector('.time-card .unit');
            if (unitEl) unitEl.style.display = 'none';

            // 保持原本無條件進位的邏輯，不影響底層原本的可用時間計算
            memberData.availableTime = Math.ceil(timer.timeRemaining / 60);
        }

        function updateTimerUIState() {
            const timer = memberTimers[memberData.id];
            const btn = document.getElementById('btn-start-3c');
            if (!timer || !btn) return;

            if (timer.isRunning) {
                btn.textContent = '暫停計時 (計時中...)';
                btn.style.backgroundColor = 'var(--danger)'; // 變成紅色提示目前正在消耗時間
                btn.style.color = 'white';
            } else {
                btn.textContent = '開啟 3C 時間';
                btn.style.backgroundColor = ''; // 恢復原本按鈕顏色
                btn.style.color = '';
            }
        }

        function toggleTimer() {
            const timer = memberTimers[memberData.id];
            if (!timer) return;

            if (timer.timeRemaining <= 0 && !timer.isRunning) {
                alert('目前沒有可用的時間喔，快去完成家事吧！');
                return;
            }

            setTimerStatusOnServer(memberData.id, !timer.isRunning);
        }

        // --- 從首頁直接控制計時器的獨立函式 ---
        function toggleTimerFromEntry(memberId) {
            const timer = memberTimers[memberId];
            if (!timer) return;

            if (timer.timeRemaining <= 0 && !timer.isRunning) {
                alert('目前沒有可用的時間喔，快去完成家事吧！');
                return;
            }

            setTimerStatusOnServer(memberId, !timer.isRunning);
        }

        function startMasterTimer() {
            if (masterInterval) return;
            lastTickTime = Date.now();
            masterInterval = setInterval(() => {
                const now = Date.now();
                // 算出與上一次執行的真實時間差（秒），解決切換分頁或背景執行時的降頻問題
                const elapsedSeconds = Math.round((now - lastTickTime) / 1000);
                if (elapsedSeconds < 1) return; // 避免過度頻繁觸發

                lastTickTime = now;
                let hasRunning = false;

                for (const id in memberTimers) {
                    const timer = memberTimers[id];
                    if (timer.isRunning && timer.timeRemaining > 0) {
                        hasRunning = true;

                        // 扣除真實經過的秒數 (不超過剩餘時間)
                        const actualElapsed = Math.min(elapsedSeconds, timer.timeRemaining);
                        timer.timeRemaining -= actualElapsed;

                        // 只有當前正在檢視該成員時，才更新 UI
                        if (memberData.id === id && document.getElementById('view-task').style.display === 'flex') {
                            updateTimerDisplay();
                        }

                        if (timer.timeRemaining <= 0) {
                            timer.isRunning = false;
                            timer.timeRemaining = 0;
                            setTimerStatusOnServer(id, false);

                            if (memberData.id === id && document.getElementById('view-task').style.display === 'flex') {
                                updateTimerDisplay();
                                updateTimerUIState();
                            }

                            const memberName = globalMembers.find(m => m.MemberID === id)?.Name || id;
                            alert(`${memberName} 的時間到囉！請放下 3C 產品讓眼睛休息一下。`);
                        }
                    }
                }

                // 即時更新首頁角色的時間狀態 (如果停留在首頁)
                if (document.getElementById('view-entry').style.display === 'flex') {
                    updateEntryRolesTime();
                }

                if (!hasRunning) {
                    clearInterval(masterInterval);
                    masterInterval = null;
                }
            }, 1000);
        }

        // --- 多裝置同步核心：向 Server 更新計時狀態 ---
        async function setTimerStatusOnServer(memberId, isRunning) {
            // Optimistic UI update (提早反應 UI)
            if (memberTimers[memberId]) {
                memberTimers[memberId].isRunning = isRunning;
                memberTimers[memberId].syncLockedUntil = Date.now() + 8000; // 鎖定 8 秒，防止被舊的輪詢狀態覆蓋
            }
            if (isRunning) startMasterTimer();
            updateEntryRolesTime();
            if (memberData.id === memberId) updateTimerUIState();

            try {
                const command = isRunning ? 'start' : 'stop';
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        apiKey: API_KEY,
                        action: 'controlTimer',
                        memberId: memberId,
                        command: command
                    })
                });

                const result = await response.json();
                if (result.success) {
                    if (memberTimers[memberId]) memberTimers[memberId].syncLockedUntil = 0; // 提早解除防閃爍鎖定
                    pollTimers(); // 強制即時觸發一次同步拉取最新總時間
                }
            } catch (error) {
                console.error('控制計時器失敗:', error);
            }
        }

        // --- 定時輪詢最新狀態 (每 5 秒同步其他裝置的行為) ---
        async function pollTimers() {
            try {
                const res = await fetch(`${GAS_API_URL}?action=getSyncStatus`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.success === false) return;

                const serverNow = data.serverNow;
                let hasRunning = false;

                data.members.forEach(sm => {
                    const id = sm.id;
                    const timerInfo = data.timers[id] || { isRunning: false };
                    let availableSeconds = Math.round(Number(sm.totalTime) * 60);

                    if (timerInfo.isRunning && timerInfo.startTime) {
                        const elapsedSeconds = Math.max(0, Math.floor((serverNow - timerInfo.startTime) / 1000));
                        availableSeconds = Math.max(0, availableSeconds - elapsedSeconds);
                    }

                    if (!memberTimers[id]) {
                        memberTimers[id] = { timeRemaining: availableSeconds, isRunning: timerInfo.isRunning };
                    } else {
                        // 檢查該成員是否正在進行狀態更新
                        const isLocked = memberTimers[id].syncLockedUntil && Date.now() < memberTimers[id].syncLockedUntil;

                        if (!isLocked) {
                            // 若狀態為暫停，或時間差異大於 2 秒，則強制對齊伺服器精準時間
                            if (!timerInfo.isRunning || Math.abs(memberTimers[id].timeRemaining - availableSeconds) > 2) {
                                memberTimers[id].timeRemaining = availableSeconds;
                            }
                            memberTimers[id].isRunning = timerInfo.isRunning;
                        }
                    }

                    if (memberTimers[id].isRunning) hasRunning = true;

                    if (memberData.id === id) {
                        memberData.availableTime = Math.ceil(memberTimers[id].timeRemaining / 60);
                        if (document.getElementById('view-task').style.display === 'flex') {
                            updateTimerDisplay();
                            updateTimerUIState();
                        }
                    }
                });

                if (document.getElementById('view-entry').style.display === 'flex') {
                    updateEntryRolesTime();
                }

                if (hasRunning && !masterInterval) {
                    startMasterTimer();
                }

            } catch (e) {
                console.error('同步輪詢失敗', e);
            }
        }

        // 獨立函式：即時更新首頁角色卡片的時間與狀態
        function updateEntryRolesTime() {
            const container = document.getElementById('role-container');
            if (!container) return;

            const cards = container.querySelectorAll('.role-card');
            cards.forEach(card => {
                const memberId = card.dataset.memberId;
                if (!memberId) return;

                const timer = memberTimers[memberId];
                if (timer) {
                    const m = Math.floor(timer.timeRemaining / 60).toString().padStart(2, '0');
                    const s = Math.floor(timer.timeRemaining % 60).toString().padStart(2, '0');
                    const timeEl = card.querySelector('.role-time');
                    const btnEl = card.querySelector('.btn-role-timer');

                    if (timeEl) {
                        timeEl.innerHTML = `${m}:${s}`;
                        if (timer.isRunning) {
                            card.classList.add('running');
                            card.style.border = '2px solid var(--primary)';
                        } else {
                            card.classList.remove('running');
                            card.style.border = '';
                        }
                    }

                    // 同步更新右側按鈕的文字與顏色狀態
                    if (btnEl) {
                        if (timer.isRunning) {
                            btnEl.textContent = '暫停';
                            btnEl.className = 'btn-role-timer btn-stop';
                        } else {
                            btnEl.textContent = '開啟';
                            btnEl.className = 'btn-role-timer btn-start';
                        }
                    }
                }
            });
        }

        async function postToGAS(payload) {

                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ apiKey: API_KEY, ...payload })
                });
                if (!response.ok) throw new Error(`伺服器錯誤: ${response.statusText}`);
                const result = await response.json();
                if (result.success === false) throw new Error(result.message || '後端處理失敗');
                return result;
            } catch (error) {
                console.error('POST 請求失敗:', error);
                alert(`操作失敗: ${error.message}`);
                throw error;
            }
        }

        async function editTask(taskId, btn) {
            const task = globalTasks.find(t => (t.TaskID || t.id) === taskId);
            if (!task) return;

            const currentName = task.TaskName || task.name;
            const currentReward = task.Reward || task.reward;

            // 1. 詢問修改名稱
            const newName = prompt('請修改家事名稱：', currentName);
            if (newName === null) return; // 按下取消

            // 2. 詢問修改分鐘數
            const newRewardStr = prompt(`請修改「${newName}」的分鐘數：`, currentReward);
            if (newRewardStr === null) return; // 按下取消

            const newReward = parseInt(newRewardStr, 10);
            if (!newName.trim() || isNaN(newReward) || newReward <= 0) {
                alert('請輸入有效的家事名稱與正數分鐘數！');
                return;
            }

            if (newName.trim() === currentName && newReward === currentReward) return; // 若沒有變更就不發送 API

            try {
                setButtonLoading(btn, true);
                await postToGAS({ action: 'editTask', taskId: taskId, name: newName.trim(), reward: newReward });
                alert('修改成功！');
                fetchInitialData(); // 重拉資料更新畫面

            } finally {
                setButtonLoading(btn, false);

            try {
                showLoader(true);
                const response = await fetch(`${GAS_API_URL}?action=getInitialData`);
                if (!response.ok) throw new Error('網路回應錯誤');
                const data = await response.json();
                if (data.success === false) throw new Error(data.message);

                globalTasks = data.tasks || [];
                globalMembers = data.members || [];

                // 初始化 server 同步的計時器狀態
                const serverNow = data.serverNow;
                globalMembers.forEach(member => {
                    const id = member.MemberID;
                    const timerInfo = data.timers && data.timers[id] ? data.timers[id] : { isRunning: false };
                    let availableSeconds = Math.round(Number(member.TotalTime || member['可用時間'] || 0) * 60);

                    if (timerInfo.isRunning && timerInfo.startTime) {
                        const elapsedSeconds = Math.max(0, Math.floor((serverNow - timerInfo.startTime) / 1000));
                        availableSeconds = Math.max(0, availableSeconds - elapsedSeconds);
                    }

                    memberTimers[id] = {
                        timeRemaining: availableSeconds,
                        isRunning: timerInfo.isRunning
                    };
                });

                renderAdminTasks();
                renderMemberDropdown();
                renderEntryRoles();
                renderAdminMembers();

                // 檢查是否需要啟動總計時器
                const hasRunning = Object.values(memberTimers).some(t => t.isRunning);
                if (hasRunning) startMasterTimer();

            } catch (error) {
                alert(`初始化資料載入失敗: ${error.message}`);
                console.error(error);
            } finally {
                showLoader(false);
            }
        }
    </script>
</body>
