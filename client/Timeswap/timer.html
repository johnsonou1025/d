<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專注計時 - TimeQuest</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- 計時器專屬樣式 --- */
        .timer-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-bottom: 60px;
        }

        /* 核心計時器容器 */
        .timer-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
        }

        /* 外環：無數小垂直線條的圓形進度條 */
        .timer-outer-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 180deg, #3b82f6, #8b5cf6, #ef4444, #f59e0b, #3b82f6);
            /* 使用 repeating-conic-gradient 遮罩做出細緻的垂直線條感 */
            -webkit-mask-image: repeating-conic-gradient(transparent 0deg, transparent 1deg, black 1deg, black 2.5deg);
            mask-image: repeating-conic-gradient(transparent 0deg, transparent 1deg, black 1deg, black 2.5deg);
            transition: opacity 0.3s;
            opacity: 0.3;
            /* 預設為未開始狀態，外環較暗 */
        }

        /* 內部圓心：純白帶輕微環狀陰影 */
        .timer-inner-circle {
            position: relative;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background-color: #ffffff;
            /* 輕微的環狀陰影帶來層次感 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08), inset 0 2px 8px rgba(0, 0, 0, 0.03);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        /* 時間顯示：大型粗體 */
        .timer-value {
            font-size: 4rem;
            /* 縮小字級以容納分與秒的 MM:SS 格式 */
            font-weight: 800;
            color: var(--text-main, #1e293b);
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            line-height: 1;
        }

        /* 控制按鈕 (深藍市立體懸浮感) */
        .btn-control {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2563eb, #1e3a8a);
            border: none;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            /* 明顯的立體懸浮感陰影 */
            box-shadow: 0 12px 24px rgba(30, 58, 138, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.2);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
        }

        .btn-control:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 16px 32px rgba(30, 58, 138, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.2);
        }

        .btn-control:active {
            transform: translateY(2px) scale(0.95);
            box-shadow: 0 6px 12px rgba(30, 58, 138, 0.4);
        }

        .btn-control svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- 頂部導覽列 (共用樣式) -->
        <header class="navbar" style="background-color: transparent; color: var(--text-main);">
            <button class="btn-back" onclick="window.location.href='index.html'" style="color: var(--text-main);">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path fill="currentColor" d="m12 20l-8-8l8-8l1.425 1.4l-5.6 5.6H20v2H7.825l5.6 5.6z" />
                </svg>
            </button>
            <div class="member-name" style="font-weight: 600;">Focus Period</div>
            <div style="width: 42px;"></div> <!-- 佔位，讓標題置中 -->
        </header>

        <main class="timer-main">
            <!-- 核心計時器 -->
            <div class="timer-wrapper">
                <div class="timer-outer-ring" id="timer-ring"></div>
                <div class="timer-inner-circle">
                    <div class="timer-value" id="timer-display">--</div>
                </div>
            </div>

            <!-- 暫停 / 播放 控制按鈕 -->
            <button class="btn-control" id="btn-toggle" onclick="toggleTimer()" aria-label="Pause/Play timer">
                <!-- 隱藏的 Pause 圖示 -->
                <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display: none;">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                </svg>
                <!-- 預設顯示的 Play 圖示 -->
                <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
            </button>
        </main>
    </div>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzlHW96hEppgLs3tbmYQxXHcgYM4EI3vyIZVqzjmJF98hpvhf0YD8sL54lXlBNSjP4/exec';
        const TEST_MEMBER_NAME = 'Cooper'; // 測試用名稱 (對應 Google Sheet 上的 Name)

        // --- 計時器邏輯 ---
        let timeRemaining = 0; // 初始設為 0
        let isRunning = false; // 預設進來是未開始狀態
        let timerInterval = null;
        let lastTickTime = null; // 紀錄上次計算時間，避免背景降頻
        let actualMemberId = null; // 儲存真實的 Member ID (例如 M01)

        const displayEl = document.getElementById('timer-display');
        const ringEl = document.getElementById('timer-ring');
        const iconPause = document.getElementById('icon-pause');
        const iconPlay = document.getElementById('icon-play');

        function updateDisplay() {
            // 顯示分鐘與秒數 (MM:SS)
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = Math.floor(timeRemaining % 60);
            displayEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            if (timeRemaining <= 0 && !isRunning) {
                alert('目前沒有可用的時間喔！');
                return;
            }

            const newState = !isRunning;
            setTimerStatusOnServer(newState);
        }

        function applyTimerState(running) {
            if (isRunning === running) return;
            isRunning = running;
            if (isRunning) {
                iconPause.style.display = 'block';
                iconPlay.style.display = 'none';
                ringEl.style.opacity = '1';
                startLocalTimer();
            } else {
                iconPause.style.display = 'none';
                iconPlay.style.display = 'block';
                ringEl.style.opacity = '0.3';
                stopLocalTimer();
            }
        }

        function startLocalTimer() {
            clearInterval(timerInterval);
            lastTickTime = Date.now();
            timerInterval = setInterval(() => {
                const now = Date.now();
                const elapsed = Math.round((now - lastTickTime) / 1000);
                if (elapsed < 1) return; // 避免過度觸發

                lastTickTime = now;
                if (timeRemaining > 0) {
                    timeRemaining -= Math.min(elapsed, timeRemaining);
                    updateDisplay();

                    if (timeRemaining <= 0) {
                        applyTimerState(false);
                        setTimerStatusOnServer(false);
                        alert('時間到！請讓眼睛休息一下。');
                    }
                }
            }, 1000);
        }

        function stopLocalTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // --- 向 Server 更新計時狀態 ---
        let syncLockedUntil = null;

        async function setTimerStatusOnServer(targetRunningState) {
            applyTimerState(targetRunningState); // 樂觀 UI 更新
            syncLockedUntil = Date.now() + 8000; // 鎖定 8 秒，防止被舊的輪詢狀態覆蓋

            try {
                const command = targetRunningState ? 'start' : 'stop';
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        apiKey: 'TQ-2026-STRICT-AUTH',
                        action: 'controlTimer',
                        memberId: actualMemberId || TEST_MEMBER_NAME,
                        command: command
                    })
                });

                const result = await response.json();
                if (result.success) {
                    syncLockedUntil = 0; // 提早解除防閃爍鎖定
                    pollTimer(); // 強制即時觸發一次同步
                }
            } catch (error) {
                console.error('控制計時器失敗:', error);
            }
        }

        // --- 定時輪詢最新狀態 (每 5 秒同步其他裝置的行為) ---
        async function pollTimer() {
            try {
                const response = await fetch(`${GAS_API_URL}?action=getChildDashboard&memberId=${TEST_MEMBER_NAME}`);
                if (!response.ok) throw new Error('網路連線錯誤');

                const result = await response.json();
                if (result.success === false) throw new Error(result.message);

                // 儲存後端回傳的真實 Member ID (例如 M01)
                actualMemberId = result.memberInfo.MemberID || TEST_MEMBER_NAME;

                const timerInfo = result.timer || { isRunning: false };
                let availableSeconds = Math.round(Number(result.memberInfo.TotalTime || result.memberInfo['可用時間'] || 0) * 60);

                if (timerInfo.isRunning && timerInfo.startTime) {
                    const elapsedSeconds = Math.max(0, Math.floor((result.serverNow - timerInfo.startTime) / 1000));
                    availableSeconds = Math.max(0, availableSeconds - elapsedSeconds);
                }

                const isLocked = syncLockedUntil && Date.now() < syncLockedUntil;

                if (!isLocked) {
                    // 若狀態為暫停，或時間差異大於 2 秒，則強制對齊伺服器精準時間
                    if (!timerInfo.isRunning || Math.abs(timeRemaining - availableSeconds) > 2) {
                        timeRemaining = availableSeconds;
                        updateDisplay();
                    }
                    applyTimerState(timerInfo.isRunning);
                }
            } catch (error) {
                console.error('同步輪詢失敗:', error);
            }
        }

        // 初始化主題 (自動偵測系統或讀取記憶)
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.body.classList.add('dark-mode');
        }

        // 初始化執行與啟動輪詢
        pollTimer();
        setInterval(pollTimer, 5000);
    </script>
</body>

</html>
