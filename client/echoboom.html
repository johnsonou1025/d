<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EchoBoom 語音終極密碼</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
  /* 定義賽博風格的核心配色 */
  --neon-green: #39FF14;
  --neon-purple: #BF00FF;
  --neon-pink: #FF00E0;
  --bg-dark: #0D0D0D;
  --glass-bg: rgba(255, 255, 255, 0.05);
  --border-glow: rgba(57, 255, 20, 0.3);
}

body {
  margin: 0;
  padding: 0;
  background-color: var(--bg-dark);
  color: white;
  font-family: 'Oswald', 'Inter', sans-serif; /* 建議引入這些字體 */
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  /* 背景微弱的網格線，增加科技感 */
  background-image: 
    linear-gradient(rgba(57, 255, 20, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(57, 255, 20, 0.05) 1px, transparent 1px);
  background-size: 30px 30px;
}

/* 主數字顯示區：使用發光特效 */
.range-container {
  font-size: 5rem;
  font-weight: 900;
  text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
  letter-spacing: -2px;
  margin-bottom: 20px;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* 範圍分隔線 */
.range-divider {
  color: var(--neon-purple);
  margin: 0 15px;
  text-shadow: 0 0 10px var(--neon-purple);
}

/* 毛玻璃面板：放置狀態訊息 */
.glass-panel {
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--border-glow);
  border-radius: 20px;
  padding: 20px 40px;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
  max-width: 80%;
}

.status-text {
  font-size: 1.2rem;
  color: #ccc;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* 聲波動畫佔位符 */
.visualizer {
  display: flex;
  align-items: center;
  gap: 5px;
  height: 40px;
  margin-top: 30px;
}

.bar {
  width: 4px;
  height: 10px;
  background: var(--neon-green);
  border-radius: 2px;
  animation: pulse 1s infinite ease-in-out;
}

/* 讓每一條聲波有不同的延遲，看起來更生動 */
.bar:nth-child(2) { animation-delay: 0.2s; }
.bar:nth-child(3) { animation-delay: 0.4s; }
.bar:nth-child(4) { animation-delay: 0.1s; }

@keyframes pulse {
  0%, 100% { height: 10px; opacity: 0.5; }
  50% { height: 40px; opacity: 1; box-shadow: 0 0 10px var(--neon-green); }
}

/* 爆炸瞬間的強烈閃爍 */
.boom-flash {
  animation: flash-red 0.2s 5;
}

@keyframes flash-red {
  0% { background: var(--bg-dark); }
  50% { background: #ff0000; }
  100% { background: var(--bg-dark); }
}
    </style>
</head>
<body>
    <div id="game-ui">
        <div class="range"><span id="min">1</span> ~ <span id="max">100</span></div>
        <div id="msg" class="status">正在聆聽語音... (請說出數字)</div>
    </div>

    <script>
        // 1. 每個視窗獨立的遊戲變數
        let min = 1, max = 100;
        let target = Math.floor(Math.random() * 100) + 1;
        let isGameOver = false;

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'zh-TW';
        recognition.continuous = true;

        recognition.onresult = (event) => {
            if (isGameOver) return;
            const transcript = event.results[event.results.length - 1][0].transcript;
            const match = transcript.match(/\d+/);
            
            if (match) {
                const guess = parseInt(match[0]);
                handleGuess(guess);
            }
        };

        function handleGuess(num) {
            if (num <= min || num >= max) return; // 忽略不在範圍內的數字

            if (num === target) {
                document.getElementById('msg').innerText = "BOOM! 爆炸了！";
                document.body.classList.add('boom');
                speak("爆炸了，遊戲結束");
                isGameOver = true;
            } else if (num < target) {
                min = num;
                updateUI();
                speak("範圍縮小到 " + min + " 到 " + max);
            } else {
                max = num;
                updateUI();
                speak("範圍縮小到 " + min + " 到 " + max);
            }
        }

        function updateUI() {
            document.getElementById('min').innerText = min;
            document.getElementById('max').innerText = max;
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        }

        recognition.start();
        // 處理語音中斷自動重啟
        recognition.onend = () => { if(!isGameOver) recognition.start(); };
    </script>
</body>
</html>
