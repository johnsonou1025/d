<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0E182E">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>沈發財股票數據平台</title>
    <link rel="stylesheet" href="style.css">
    <script src="jquery-3.7.0.min.js"></script>
    <script src="stock.js"></script>
</head>

<body>
    <div class="status-wrapper">
        <div class="loading">
            <div class="spinner"></div>
        </div>
        <p class="results">資料載入中…</p>
    </div>
    <div class="wrap">
        <div class="header-outer">
            <div class="header">
                <div class="row">
                    <h4>沈發財股票數據平台</h4>
                    <p>即時追蹤投資組合</p>
                </div>
                <div class="data-update-time"></div>
            </div>
        </div>
        <div class="main-content row">
            <div class="data-basic">
                <div class="headline">
                    定額操作數據(單次進場 2000)
                </div>
                <div class="col">
                    <div class="card">
                        <span>持倉總數</span>
                        <h4 id="holding-shares-count"></h4>
                    </div>
                    <div class="card">
                        <span>持倉金額</span>
                        <h4 id="holding-investment-amount"></h4>
                    </div>
                    <div class="card">
                        <span>持倉損益</span>
                        <h4 id="holding-profit-loss"></h4>
                    </div>
                    <div class="card">
                        <span>賣出收益(近30天累計)</span>
                        <h4 id="sell-month-profit-loss"></h4>
                    </div>
                </div>
            </div>
            <div class="data-today">
                <div class="headline">
                    今日操作建議
                </div>
                <div class="col">
                    <div class="data-today-buy">
                        <div class="headline">建議買進</div>
                        <table>
                            <tr>
                                <th>日期</th>
                                <th>名稱</th>
                                <th>買進價格</th>
                                <!-- <th>進場均價</th> -->
                                <!-- <th>進場張數</th> -->
                                <!-- <th>報酬率</th> -->
                            </tr>
                        </table>
                    </div>
                    <div class="data-today-sell">
                        <div class="headline">
                            建議賣出
                        </div>
                        <table>
                            <tr>
                                <th>日期</th>
                                <th>名稱</th>
                                <!-- <th>進場均價</th> -->
                                <!-- <th>進場張數</th> -->
                                <th>報酬率</th>
                                <!-- <th>獲利金額</th> -->
                            </tr>
                        </table>
                    </div>
                    <div class="data-today-strong">
                        <div class="headline">強勢股推薦</div>
                        <table>
                            <tr>
                                <th>日期</th>
                                <th>股票代號</th>
                                <th>進場價格</th>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
            <div class="data-holdings">
                <div class="headline">
                    進場中股票
                </div>
                <table>
                    <tr>
                        <th>名稱<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><!-- Icon from Google Material Icons by Material Design Authors - https://github.com/material-icons/material-icons/blob/master/LICENSE --><path fill="currentColor" d="M9 3L5 6.99h3V14h2V6.99h3zm7 14.01V10h-2v7.01h-3L15 21l4-3.99z"/></svg></th>
                        <th>今日價格<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><!-- Icon from Google Material Icons by Material Design Authors - https://github.com/material-icons/material-icons/blob/master/LICENSE --><path fill="currentColor" d="M9 3L5 6.99h3V14h2V6.99h3zm7 14.01V10h-2v7.01h-3L15 21l4-3.99z"/></svg></th>
                        <th>進場均價(張數)<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><!-- Icon from Google Material Icons by Material Design Authors - https://github.com/material-icons/material-icons/blob/master/LICENSE --><path fill="currentColor" d="M9 3L5 6.99h3V14h2V6.99h3zm7 14.01V10h-2v7.01h-3L15 21l4-3.99z"/></svg></th>
                        <!-- <th>進場張數</th> -->
                        <th>報酬率<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><!-- Icon from Google Material Icons by Material Design Authors - https://github.com/material-icons/material-icons/blob/master/LICENSE --><path fill="currentColor" d="M9 3L5 6.99h3V14h2V6.99h3zm7 14.01V10h-2v7.01h-3L15 21l4-3.99z"/></svg></th>
                    </tr>
                </table>
            </div>
            <div class="data-sold">
                <div class="headline">
                    已賣出股票(近30天)
                    <div class="month-profit-loss">近30天累計損益<span></span></div>
                </div>
                <table>
                    <tr>
                        <th>賣出日期</th>
                        <th>名稱</th>
                        <th>進場均價(張數)</th>
                        <th>獲利金額(報酬率)</th>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
