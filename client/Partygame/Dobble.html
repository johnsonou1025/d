<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Reaction King - 雙人對戰模式</title>
    <style>
        :root {
            --red-team: #FF3366;
            --red-team-dark: #CC0033;
            --blue-team: #00BFFF;
            --blue-team-dark: #007399;
            --candy-bg-1: #FFD1FF;
            --candy-bg-2: #80D4FF;
            --primary-candy: #FF3399;
            --primary-candy-dark: #CC0066;
            --glass: rgba(255, 255, 255, 0.1);
            --neon-green: #00CC66;
        }

        /* 深色版型變數 */
        body.dark-theme {
            --candy-bg-1: #2E1A47;
            --candy-bg-2: #0D0518;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--candy-bg-2);
            background: radial-gradient(circle at center, var(--candy-bg-1) 0%, var(--candy-bg-2) 100%);
            color: white;
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            height: 100vmin;
            width: 100vmax;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* 鎖定橫向：當設備直向時，將 body 旋轉 90 度 */
        @media screen and (orientation: portrait) {
            body {
                transform: rotate(90deg);
                transform-origin: left top;
                position: absolute;
                top: 0;
                left: 100vw;
            }
        }

        /* --- 頂部狀態欄 --- */
        .top-bar {
            height: 12vmin;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            position: relative;
            z-index: 10;
        }

        .score-box {
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            letter-spacing: 2px;
        }

        .score-box.red {
            color: white;
            text-shadow: 0 4px 0 var(--red-team-dark), 0 8px 10px rgba(0, 0, 0, 0.3);
            -webkit-text-stroke: 1.5px var(--red-team-dark);
        }

        .score-box.blue {
            color: white;
            text-shadow: 0 4px 0 var(--blue-team-dark), 0 8px 10px rgba(0, 0, 0, 0.3);
            -webkit-text-stroke: 1.5px var(--blue-team-dark);
        }

        .round-info {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: white;
            background: #FF9900;
            padding: 8px 25px;
            border-radius: 30px;
            border: 3px solid #fff;
            box-shadow: 0 4px 0 #CC6600, 0 8px 10px rgba(0, 0, 0, 0.2);
        }

        /* 回首頁按鈕 */
        .home-btn {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            text-decoration: none;
            background: #FF3399;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 3px solid #fff;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 4px 0 #CC0066, 0 5px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .home-btn:active {
            transform: translateY(calc(-50% + 4px));
            box-shadow: 0 0px 0 #CC0066, 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        /* --- 主遊戲區 --- */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: row;
            height: 88vmin;
        }

        /* 兩側搶答按鈕 */
        .buzz-btn {
            width: 15%;
            height: 85%;
            margin: auto 2%;
            border-radius: 40px;
            border: 6px solid #fff;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s, filter 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            gap: 10px;
        }

        .buzz-btn:active:not(:disabled) {
            transform: translateY(8px);
        }

        .buzz-btn:disabled {
            filter: grayscale(1);
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-red {
            background: linear-gradient(to bottom, #FF6699, var(--red-team));
            box-shadow: inset 0 8px 10px rgba(255, 255, 255, 0.4), 0 8px 0 var(--red-team-dark), 0 15px 15px rgba(0, 0, 0, 0.3);
            flex-direction: column-reverse;
        }

        .btn-red:active:not(:disabled) {
            box-shadow: inset 0 8px 10px rgba(255, 255, 255, 0.4), 0 0px 0 var(--red-team-dark), 0 5px 5px rgba(0, 0, 0, 0.3);
        }

        .btn-red span {
            transform: rotate(90deg);
        }

        .btn-blue {
            background: linear-gradient(to bottom, #66CCFF, var(--blue-team));
            box-shadow: inset 0 8px 10px rgba(255, 255, 255, 0.4), 0 8px 0 var(--blue-team-dark), 0 15px 15px rgba(0, 0, 0, 0.3);
            flex-direction: column;
        }

        .btn-blue:active:not(:disabled) {
            box-shadow: inset 0 8px 10px rgba(255, 255, 255, 0.4), 0 0px 0 var(--blue-team-dark), 0 5px 5px rgba(0, 0, 0, 0.3);
        }

        .btn-blue span {
            transform: rotate(-90deg);
        }

        /* 中央舞台 */
        .center-stage {
            width: 70%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 倒數計時器 */
        .countdown {
            font-size: 15vmax;
            color: white;
            -webkit-text-stroke: 4px #FF3399;
            text-shadow: 0 8px 0 #CC0066, 0 15px 20px rgba(0, 0, 0, 0.4);
            position: absolute;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        /* 圓形卡片 */
        .cards-container {
            display: flex;
            gap: 5vmax;
            opacity: 0;
            display: none;
            /* JS 控制顯示 */
        }

        .cards-container.active {
            display: flex;
            animation: fadeIn 0.4s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .card {
            width: 25vmax;
            height: 25vmax;
            max-width: 320px;
            max-height: 320px;
            background: #FFFFFF;
            border: 8px solid #fff;
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.05), 0 15px 25px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .card-icon {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- 答題頁面 Overlay --- */
        .answer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vmax;
            height: 100vmin;
            background: rgba(255, 255, 255, 0.6);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        body.dark-theme .answer-overlay {
            background: rgba(0, 0, 0, 0.6);
        }

        .answer-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .answer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s ease;
        }

        .face-red {
            transform: rotate(90deg);
        }

        .face-blue {
            transform: rotate(-90deg);
        }

        .answer-header {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
            -webkit-text-stroke: 1px #fff;
        }

        /* 答題九宮格與外框 */
        .answer-board {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 35px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            border: 6px solid #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .answer-board.turn-red {
            border-color: var(--red-team);
            animation: breathe-red 1s infinite alternate;
        }

        .answer-board.turn-blue {
            border-color: var(--blue-team);
            animation: breathe-blue 1s infinite alternate;
        }

        @keyframes breathe-red {
            0% {
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15), 0 0 0 4px rgba(255, 51, 102, 0.3);
            }

            100% {
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15), 0 0 0 12px rgba(255, 51, 102, 0.1);
            }
        }

        @keyframes breathe-blue {
            0% {
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15), 0 0 0 4px rgba(0, 191, 255, 0.3);
            }

            100% {
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15), 0 0 0 12px rgba(0, 191, 255, 0.1);
            }
        }

        .grid-icon {
            width: 14vmin;
            height: 14vmin;
            max-width: 100px;
            max-height: 100px;
            background: #FFFFFF;
            border-radius: 15px;
            border: 3px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7vmin;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 5px 0 #ddd, 0 10px 10px rgba(0, 0, 0, 0.1);
        }

        .grid-icon:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #ddd, 0 5px 5px rgba(0, 0, 0, 0.1);
        }

        .grid-icon.disabled {
            opacity: 0.3;
            filter: grayscale(1);
            pointer-events: none;
        }

        /* 倒數計時條 */
        .timer-container {
            width: 300px;
            height: 15px;
            background: rgba(0, 0, 0, 0.1);
            border: 3px solid #fff;
            border-radius: 15px;
            margin-top: 30px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(to right, #FFD633, #FF9900);
            transform-origin: left;
            border-radius: 10px;
        }

        /* --- 大廳選擇疊層 --- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 209, 255, 0.95) 0%, rgba(128, 212, 255, 0.95) 100%);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body.dark-theme #overlay {
            background: radial-gradient(circle at center, rgba(46, 26, 71, 0.95) 0%, rgba(13, 5, 24, 0.95) 100%);
        }

        .setting-section {
            width: 80%;
            max-width: 500px;
            margin-bottom: 25px;
            text-align: center;
        }

        .label {
            font-size: 0.85rem;
            font-weight: 900;
            color: white;
            background: #FF9900;
            padding: 6px 14px;
            border-radius: 20px;
            border: 2px solid #fff;
            box-shadow: 0 4px 0 #CC6600, 0 8px 10px rgba(0, 0, 0, 0.2);
            display: inline-block;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .opt-btn {
            background: #FFFFFF;
            border: 3px solid #eee;
            border-radius: 15px;
            padding: 12px 5px;
            color: #666;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 0 #ccc;
        }

        .opt-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #ccc;
        }

        .opt-btn.active {
            background: var(--primary-candy);
            color: white;
            border-color: #fff;
            box-shadow: 0 4px 0 var(--primary-candy-dark);
        }

        .start-action-btn {
            margin-top: 20px;
            background: linear-gradient(to bottom, #66FFB2, #00CC66);
            color: white;
            border: 4px solid #fff;
            padding: 15px 50px;
            border-radius: 40px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: inset 0px 6px 10px rgba(255, 255, 255, 0.6), 0 8px 0px #00994C, 0 10px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            text-shadow: 0 3px 0 #00994C;
        }

        .start-action-btn:active {
            transform: translateY(6px);
            box-shadow: inset 0px 6px 10px rgba(255, 255, 255, 0.6), 0 2px 0px #00994C, 0 4px 10px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <script>
        if (localStorage.getItem('party-theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>

    <div id="overlay">
        <a href="index.html" class="home-btn" style="top: 20px; left: 20px; transform: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                <path fill="currentColor" d="M6 19h3v-6h6v6h3v-9l-6-4.5L6 10zM4 21V9l8-6l8 6v12h-7v-6h-2v6z"></path>
            </svg>
        </a>
        <h1
            style="font-size: 3.5rem; margin: 0 0 30px 0; color: white; -webkit-text-stroke: 2px var(--primary-candy); text-shadow: 0 5px 0 var(--primary-candy-dark);">
            Reaction King</h1>

        <div class="setting-section">
            <div class="label">難度選擇 (圖案數量)</div>
            <div class="btn-grid" id="diff-grid"></div>
        </div>

        <button class="start-action-btn" onclick="initGame()">GO!</button>
    </div>

    <div class="top-bar">
        <a href="#" onclick="quitToLobby(); return false;" class="home-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8l8 8l1.41-1.41L7.83 13H20v-2z"></path>
            </svg>
        </a>
        <div class="score-box red" style="margin-left: 60px;">
            <span style="font-size: 1.2rem; font-weight: 900;">RED</span>
            <span id="score-red">0</span>
        </div>
        <div class="round-info" id="round-display">ROUND 1 / 10</div>
        <div class="score-box blue">
            <span id="score-blue">0</span>
            <span style="font-size: 1.2rem; font-weight: 900;">BLUE</span>
        </div>
    </div>

    <div class="main-area">
        <button class="buzz-btn btn-red" id="btn-red" onclick="buzz('red')"
            disabled><span>搶</span><span>答</span></button>

        <div class="center-stage">
            <div class="countdown" id="countdown-text">READY</div>
            <div class="cards-container" id="cards-container">
                <div class="card" id="card-a"></div>
                <div class="card" id="card-b"></div>
            </div>
        </div>

        <button class="buzz-btn btn-blue" id="btn-blue" onclick="buzz('blue')"
            disabled><span>搶</span><span>答</span></button>
    </div>

    <!-- 答題頁面 -->
    <div class="answer-overlay" id="answer-overlay">
        <div class="answer-content" id="answer-content">
            <div class="answer-header" id="answer-header">RED TURN</div>
            <div class="answer-board turn-red" id="answer-board">
                <!-- 15 icons will be injected here -->
            </div>
            <div class="timer-container">
                <div class="timer-bar" id="timer-bar"></div>
            </div>
        </div>
    </div>

    <script>
        // 圖示庫 (擴展加入動物與文具)
        const SYMBOLS = [
            '🍎', '🍌', '🍇', '🍉', '🍓', '🍒', '🍑', '🍍', '🥝', '🍅', '🥥', '🥑', '🍔', '🍟', '🍕', '🌭', '🍿', '🍩', '🍦', '🍭', '🍬',
            '🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐧', '🐦', '🐤', '🦆', '🦅', '🦉', '🦇', '🐺', '🐗', '🐴', '🦄', '🐝', '🐛', '🦋', '🐌', '🐞', '🐜',
            '✏️', '✒️', '🖋️', '🖊️', '🖌️', '🖍️', '📝', '💼', '📁', '📂', '📅', '📆', '📇', '📈', '📉', '📊', '📋', '📌', '📍', '📎', '📏', '📐', '✂️', '📓', '📔', '📒', '📕', '📗', '📘', '📙', '📚', '📖'
        ];
        // 卡片上圖示的位置分佈 (以中心為原點的百分比)
        const POSITIONS = [
            { top: '50%', left: '50%' }, // 中心
            { top: '20%', left: '50%' }, // 上
            { top: '30%', left: '78%' }, // 右上
            { top: '60%', left: '83%' }, // 右下
            { top: '82%', left: '60%' }, // 下（偏右）
            { top: '82%', left: '30%' }, // 下（偏左）
            { top: '55%', left: '17%' }, // 左下
            { top: '25%', left: '25%' }, // 左上
            { top: '38%', left: '38%' }, // 內左上
            { top: '38%', left: '62%' }, // 內右上
            { top: '62%', left: '50%' }  // 內下
        ];

        let scores = { red: 0, blue: 0 };
        let round = 1;
        const MAX_ROUNDS = 10;

        let currentMatch = null;
        let currentUnion = [];
        let gameState = 'init'; // init, countdown, playing, answering, ended
        let currentTurn = null; // 'red' or 'blue'
        let hasPassed = false;

        let answerTimerInterval;
        let countdownInterval;
        let transitionTimeout;
        let timeLeft = 10000; // 10秒

        const DIFFICULTIES = [
            { label: '簡單', count: 2 },
            { label: '一般', count: 5 },
            { label: '困難', count: 8 },
            { label: '地獄', count: 11 }
        ];
        let symbolsCount = 5; // 預設為一般

        // DOM 元素
        const btnRed = document.getElementById('btn-red');
        const btnBlue = document.getElementById('btn-blue');
        const scoreRedUI = document.getElementById('score-red');
        const scoreBlueUI = document.getElementById('score-blue');
        const roundDisplay = document.getElementById('round-display');
        const countdownText = document.getElementById('countdown-text');
        const cardsContainer = document.getElementById('cards-container');
        const cardA = document.getElementById('card-a');
        const cardB = document.getElementById('card-b');
        const overlay = document.getElementById('answer-overlay');
        const answerContent = document.getElementById('answer-content');
        const answerBoard = document.getElementById('answer-board');
        const answerHeader = document.getElementById('answer-header');
        const timerBar = document.getElementById('timer-bar');

        // 音效模組
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'buzz') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // 工具函數：陣列洗牌
        function shuffle(array) {
            let curr = array.length, rand;
            while (curr != 0) {
                rand = Math.floor(Math.random() * curr);
                curr--;
                [array[curr], array[rand]] = [array[rand], array[curr]];
            }
            return array;
        }

        function showLobby() {
            document.getElementById('overlay').style.display = 'flex';
            renderDifficultyButtons();
        }

        function renderDifficultyButtons() {
            const grid = document.getElementById('diff-grid');
            grid.innerHTML = '';
            DIFFICULTIES.forEach((diff) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn' + (diff.count === symbolsCount ? ' active' : '');
                btn.innerHTML = `${diff.label}<br><span style="font-size:0.75rem; opacity:0.8;">(${diff.count}圖)</span>`;
                btn.onclick = function () {
                    symbolsCount = diff.count;
                    document.querySelectorAll('#diff-grid .opt-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                };
                grid.appendChild(btn);
            });
        }

        function initGame() {
            document.getElementById('overlay').style.display = 'none';
            scores = { red: 0, blue: 0 };
            round = 1;
            updateScoreUI();
            startRound();
        }

        function quitToLobby() {
            gameState = 'ended';
            clearInterval(answerTimerInterval);
            clearInterval(countdownInterval);
            clearTimeout(transitionTimeout);
            showLobby();
        }

        function updateScoreUI() {
            scoreRedUI.innerText = scores.red;
            scoreBlueUI.innerText = scores.blue;
            roundDisplay.innerText = `ROUND ${Math.min(round, MAX_ROUNDS)} / ${MAX_ROUNDS}`;
        }

        function startRound(isRestart = false) {
            if (!isRestart && round > MAX_ROUNDS) {
                endGame();
                return;
            }
            gameState = 'countdown';
            overlay.classList.remove('active');
            cardsContainer.classList.remove('active');
            countdownText.style.display = 'block';

            btnRed.disabled = true;
            btnBlue.disabled = true;

            let count = 3; // 3秒倒數
            countdownText.innerText = count;
            countdownText.style.color = "white";

            countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownText.innerText = count;
                } else {
                    clearInterval(countdownInterval);
                    countdownText.style.display = 'none';
                    if (isRestart) {
                        cardsContainer.classList.add('active');
                        gameState = 'playing';
                        btnRed.disabled = false;
                        btnBlue.disabled = false;
                    } else {
                        generateCards();
                    }
                }
            }, 1000);
        }

        function generateCards() {
            let pool = shuffle([...SYMBOLS]);
            currentMatch = pool[0];
            let neededOthers = 2 * (symbolsCount - 1);
            let others = pool.slice(1, 1 + neededOthers);

            let setA = shuffle([currentMatch, ...others.slice(0, symbolsCount - 1)]);
            let setB = shuffle([currentMatch, ...others.slice(symbolsCount - 1, neededOthers)]);

            currentUnion = shuffle([...setA, ...setB.filter(x => x !== currentMatch)]);

            renderCard(cardA, setA);
            renderCard(cardB, setB);

            cardsContainer.classList.add('active');
            gameState = 'playing';
            btnRed.disabled = false;
            btnBlue.disabled = false;
        }

        function renderCard(cardEl, symbols) {
            cardEl.innerHTML = '';
            const baseSize = 25 / symbolsCount + 1.5; // 動態計算圖案大小
            symbols.forEach((sym, index) => {
                const pos = POSITIONS[index];
                const icon = document.createElement('div');
                icon.className = 'card-icon';
                icon.innerText = sym;
                // 加入隨機大小與旋轉增加難度
                const scale = (Math.random() * 0.5 + 0.8).toFixed(2);
                const rotate = Math.floor(Math.random() * 360);
                icon.style.top = pos.top;
                icon.style.left = pos.left;
                icon.style.transform = `translate(-50%, -50%) rotate(${rotate}deg) scale(${scale})`;
                icon.style.fontSize = `${baseSize * scale}vmax`;
                cardEl.appendChild(icon);
            });
        }

        window.buzz = function (team) {
            if (gameState !== 'playing') return;
            playTone('buzz');
            if (navigator.vibrate) navigator.vibrate(50);

            gameState = 'answering';
            currentTurn = team;
            hasPassed = false;
            btnRed.disabled = true;
            btnBlue.disabled = true;

            setupAnswerBoard();
            overlay.classList.add('active');
            startAnswerTimer();
        };

        function setupAnswerBoard() {
            answerHeader.innerText = `${currentTurn.toUpperCase()} TURN`;
            answerHeader.style.color = currentTurn === 'red' ? 'var(--red-team)' : 'var(--blue-team)';

            answerBoard.className = `answer-board turn-${currentTurn}`;
            answerBoard.style.pointerEvents = 'auto';
            answerBoard.innerHTML = '';
            answerContent.className = `answer-content face-${currentTurn}`;

            // 動態切換九宮格的排版欄數與大小
            let cols = 3;
            let iconSize = '18vmin';
            if (symbolsCount === 5) { cols = 3; iconSize = '16vmin'; }
            else if (symbolsCount === 8) { cols = 3; iconSize = '14vmin'; }
            else if (symbolsCount === 11) { cols = 3; iconSize = '11vmin'; }

            answerBoard.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            currentUnion.forEach(sym => {
                const btn = document.createElement('div');
                btn.className = 'grid-icon';
                btn.style.width = iconSize;
                btn.style.height = iconSize;
                btn.style.maxWidth = 'none';
                btn.style.maxHeight = 'none';
                btn.style.fontSize = `calc(${iconSize} * 0.5)`;
                btn.innerText = sym;
                btn.onclick = () => handleAnswer(sym, btn);
                answerBoard.appendChild(btn);
            });
        }

        function startAnswerTimer() {
            clearInterval(answerTimerInterval);
            timeLeft = 10000; // 10000ms = 10s
            timerBar.style.transform = `scaleX(1)`;

            answerTimerInterval = setInterval(() => {
                timeLeft -= 50;
                let ratio = Math.max(0, timeLeft / 10000);
                timerBar.style.transform = `scaleX(${ratio})`;

                if (timeLeft <= 0) {
                    clearInterval(answerTimerInterval);
                    handleWrong(null);
                }
            }, 50);
        }

        function handleAnswer(sym, btnElement) {
            if (btnElement.classList.contains('disabled')) return;
            clearInterval(answerTimerInterval);

            if (sym === currentMatch) {
                // 答對
                gameState = 'transitioning';
                playTone('correct');
                scores[currentTurn]++;
                btnElement.style.background = 'var(--neon-green)';
                answerBoard.style.pointerEvents = 'none';
                transitionTimeout = setTimeout(() => {
                    round++;
                    updateScoreUI();
                    startRound();
                }, 1000);
            } else {
                // 答錯
                handleWrong(btnElement);
            }
        }

        function handleWrong(btnElement) {
            playTone('wrong');
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            if (btnElement) btnElement.classList.add('disabled');

            if (!hasPassed) {
                // 換人
                hasPassed = true;
                currentTurn = currentTurn === 'red' ? 'blue' : 'red';
                answerHeader.innerText = `${currentTurn.toUpperCase()} TURN`;
                answerHeader.style.color = currentTurn === 'red' ? 'var(--red-team)' : 'var(--blue-team)';
                answerBoard.className = `answer-board turn-${currentTurn}`;
                answerContent.className = `answer-content face-${currentTurn}`;
                startAnswerTimer();
            } else {
                // 兩人都錯，同一題重新來過
                gameState = 'transitioning';
                answerHeader.innerText = "RESTART";
                answerHeader.style.color = "white";
                answerBoard.className = "answer-board"; // 移除呼吸燈
                answerBoard.style.pointerEvents = 'none';
                transitionTimeout = setTimeout(() => {
                    startRound(true);
                }, 1000);
            }
        }

        function endGame() {
            gameState = 'ended';
            overlay.classList.remove('active');
            cardsContainer.classList.remove('active');
            countdownText.style.display = 'block';

            let msg = "DRAW!";
            let color = "white";
            if (scores.red > scores.blue) { msg = "RED WINS!"; color = "var(--red-team)"; }
            else if (scores.blue > scores.red) { msg = "BLUE WINS!"; color = "var(--blue-team)"; }

            countdownText.innerHTML = `<span style="color:${color}; font-size:12vmax;">${msg}</span><br>
                <button class="start-action-btn" onclick="showLobby()" style="margin-top:20px; font-size: 1.5rem; padding: 10px 40px;">回大廳</button>`;
        }

        // 確保音效權限在第一次點擊時取得
        document.body.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });

        // 初始化載入大廳
        window.onload = showLobby;

    </script>
</body>
