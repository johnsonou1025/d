<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EchoBoom - Bomb Edition</title>
    <style>
        :root {
            --candy-bg-1: #FFD1FF;
            --candy-bg-2: #80D4FF;
            --primary-candy: #FF3399;
            --primary-candy-dark: #CC0066;
            --secondary-candy: #00BFFF;
            --secondary-candy-dark: #007399;
        }

        /* 深色版型變數 */
        body.dark-theme {
            --candy-bg-1: #2E1A47;
            --candy-bg-2: #0D0518;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--candy-bg-2);
            background: radial-gradient(circle at center, var(--candy-bg-1) 0%, var(--candy-bg-2) 100%);
            color: white;
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            transition: background 0.3s;
        }

        /* 頂部資訊 */
        .header {
            width: 90%;
            padding: 25px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            background: #FF3399;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 3px solid #fff;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 4px 0 #CC0066, 0 5px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            z-index: 200;
        }

        .home-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #CC0066, 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        /* 中央遊戲看板 */
        .stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .number-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            border: 8px solid #fff;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1), 0 10px 20px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }
        }

        .range-text {
            font-size: 2.5rem;
            color: var(--primary-candy);
            -webkit-text-stroke: 2px var(--primary-candy-dark);
            text-shadow: 0 4px 0 var(--primary-candy-dark);
            margin: 0;
        }

        .range-label {
            font-size: 0.85rem;
            font-weight: 900;
            background: #FFD633;
            padding: 4px 14px;
            border-radius: 20px;
            border: 2px solid #fff;
            box-shadow: 0 3px 0 #CC9900;
            color: white;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .status-popup {
            margin-top: 40px;
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
            -webkit-text-stroke: 1.5px #fff;
        }

        /* 炸彈視覺特效 */
        #bomb-visual {
            position: fixed;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8rem;
            z-index: 200;
            pointer-events: none;
            display: none;
        }

        @keyframes bomb-drop {
            0% {
                top: -150px;
                transform: translateX(-50%) scale(0.5);
            }

            60% {
                top: 40%;
                transform: translateX(-50%) scale(1.2);
            }

            80% {
                top: 40%;
                transform: translateX(-50%) scale(1.1);
                filter: drop-shadow(0 0 20px red);
            }

            100% {
                top: 40%;
                transform: translateX(-50%) scale(3);
                opacity: 0;
                filter: drop-shadow(0 0 50px white);
            }
        }

        /* 爆炸震撼效果 */
        .boom-mode {
            background: #FF3366 !important;
        }

        .boom-shake {
            animation: intense-shake 0.1s infinite;
        }

        @keyframes intense-shake {
            0% {
                transform: translate(5px, 5px) rotate(1deg);
            }

            50% {
                transform: translate(-5px, -5px) rotate(-1deg);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        /* 底部操作 */
        .footer {
            width: 100%;
            padding-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .btn-3d {
            border: none;
            cursor: pointer;
            color: white;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .main-talk-btn {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #FF6699, var(--primary-candy));
            border: 6px solid #fff;
            box-shadow: inset 0 8px 10px rgba(255, 255, 255, 0.5), 0 8px 0 var(--primary-candy-dark), 0 15px 15px rgba(0, 0, 0, 0.3);
            font-size: 1.2rem;
            text-shadow: 0 2px 0 var(--primary-candy-dark);
        }

        .main-talk-btn:active {
            transform: translateY(6px);
            box-shadow: inset 0 8px 10px rgba(255, 255, 255, 0.5), 0 2px 0 var(--primary-candy-dark), 0 5px 5px rgba(0, 0, 0, 0.3);
        }

        .side-btn {
            width: 65px;
            height: 65px;
            border-radius: 20px;
            background: linear-gradient(to bottom, #66CCFF, #00BFFF);
            border: 4px solid #fff;
            box-shadow: inset 0 4px 8px rgba(255, 255, 255, 0.5), 0 6px 0 var(--secondary-candy-dark), 0 10px 10px rgba(0, 0, 0, 0.2);
            font-size: 0.75rem;
            color: white;
        }

        .side-btn:active {
            transform: translateY(4px);
            box-shadow: inset 0 4px 8px rgba(255, 255, 255, 0.5), 0 2px 0 var(--secondary-candy-dark), 0 5px 5px rgba(0, 0, 0, 0.2);
        }

        /* 輸入抽屜 */
        .drawer {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-top: 6px solid #fff;
            border-radius: 30px 30px 0 0;
            padding: 40px 0;
            transition: bottom 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            box-shadow: 0 -10px 20px rgba(0, 0, 0, 0.1);
        }

        body.dark-theme .drawer {
            background: rgba(46, 26, 71, 0.9);
        }

        .drawer.active {
            bottom: 0;
        }

        .drawer-input {
            background: #fff;
            border: 4px solid #eee;
            border-radius: 20px;
            color: var(--primary-candy);
            font-size: 4rem;
            width: 220px;
            text-align: center;
            outline: none;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        /* 炸彈掉落與蓄力動畫 (總長 3s) */
        @keyframes bomb-sequence {
            0% {
                top: -150px;
                transform: translateX(-50%) scale(0.5);
                opacity: 1;
            }

            20% {
                top: 40%;
                transform: translateX(-50%) scale(1);
            }

            /* 0.6s 掉到中間 */
            53% {
                top: 40%;
                transform: translateX(-50%) scale(1);
            }

            /* 停頓約 1s */
            55% {
                top: 40%;
                transform: translateX(-50%) scale(1.05);
            }

            /* 開始震動放大 */
            85% {
                top: 40%;
                transform: translateX(-50%) scale(1.5);
                filter: drop-shadow(0 0 30px red);
            }

            100% {
                top: 40%;
                transform: translateX(-50%) scale(4);
                opacity: 0;
                filter: drop-shadow(0 0 60px white);
            }
        }

        /* 爆炸後紅色覆蓋層 */
        .boom-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #FF3366, #CC0033);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
        }

        /* 爆炸瞬間變紅 */
        .boom-active {
            opacity: 1;
        }

        /* 2秒慢慢淡掉 */
        .boom-fade-out {
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* 強化的劇烈震動 (對應炸彈放大時) */
        @keyframes mega-shake {
            0% {
                transform: translate(5px, 5px);
            }

            25% {
                transform: translate(-5px, 5px);
            }

            50% {
                transform: translate(5px, -5px);
            }

            75% {
                transform: translate(-5px, -5px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        .mega-shake-active {
            animation: mega-shake 0.1s infinite;
        }
    </style>
</head>

<body>
    <script>
        if (localStorage.getItem('party-theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>
    <div id="boom-overlay" class="boom-overlay"></div>
    <div id="bomb-visual">
        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
            <path fill="currentColor"
                d="M11.5 22q-2.325 0-4.137-1.288T5.1 18.15l1.4-1.425q1.15 1.8 2.988 2.763T13.5 20q.55 0 1.075-.113t1.025-.337l-1.425-1.425q-.35.125-.725.175T12.5 18q-2.3 0-3.9-1.6T7 12.5q0-1.05.388-2.013t1.087-1.737L7.05 7.325Q6.025 8.55 5.513 9.988T5 11.5q0 3.125 2.188 5.313T12.5 19q.775 0 1.525-.175t1.425-.525l1.425 1.425q-1.1 1.025-2.537 1.638T11.5 22m8.8-8.8q0-1.5-1.012-2.713T16.5 9.25l-1.4 1.4q.95.5 1.525 1.438T17.2 14q0 .55-.112 1.075t-.338 1.025l1.425 1.425q1.025-1.1 1.638-2.537T20.3 13.2m-3.925-6.5L15.65 6L14 4.35l.725-.725q.875-.875 2.088-1.2T19.5 2q1.45 0 2.475 1.025T23 5.5q0 1.175-.325 2.388t-1.2 2.087zM19.5 7q.625 0 1.063-.437T21 5.5q0-.625-.437-1.062T19.5 4q-.625 0-1.062.438T18 5.5q0 .625.438 1.063T19.5 7M12.5 17q1.875 0 3.188-1.312T17 12.5q0-1.875-1.312-3.187T12.5 8q-1.875 0-3.187 1.313T8 12.5q0 1.875 1.313 3.188T12.5 17">
            </path>
        </svg>
    </div>

    <div class="header">
        <!-- Home 按鈕 -->
        <a href="index.html" class="home-btn"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                viewBox="0 0 24 24">
                <path fill="currentColor" d="M6 19h3v-6h6v6h3v-9l-6-4.5L6 10zM4 21V9l8-6l8 6v12h-7v-6h-2v6z"></path>
            </svg></a>
    </div>

    <div class="stage">
        <div class="number-circle" id="circle">
            <p class="range-label">RANGE</p>
            <h1 class="range-text" id="range-display">1 ~ 100</h1>
        </div>
        <div id="status-msg" class="status-popup">READY</div>
    </div>

    <div class="footer">
        <button class="btn-3d side-btn" id="open-type">鍵盤</button>
        <button class="btn-3d main-talk-btn" id="talk-btn">點擊<br>說話</button>
        <button class="btn-3d side-btn" id="reset-btn">開</button>
    </div>

    <div class="drawer" id="input-drawer">
        <p
            style="font-weight: 900; background: #FF9900; padding: 6px 14px; border-radius: 20px; border: 2px solid #fff; box-shadow: 0 4px 0 #CC6600; color: white; margin-bottom: 15px; letter-spacing: 2px;">
            GUESS NUMBER</p>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="number" class="drawer-input" id="num-input" pattern="\d*" placeholder="0">
            <!-- 新增發送按鈕 -->
            <button id="submit-num"
                style="background: linear-gradient(to bottom, #66FFB2, #00CC66); border: 4px solid #fff; width: 70px; height: 70px; border-radius: 20px; color: white; font-size: 1.5rem; font-weight: 900; cursor: pointer; box-shadow: inset 0 4px 8px rgba(255,255,255,0.5), 0 6px 0 #00994C;">OK</button>
        </div>
        <button id="close-drawer"
            style="background:#eee; border: 3px solid #fff; padding: 10px 20px; border-radius: 20px; box-shadow: 0 4px 0 #ccc; color:#888; margin-top:30px; font-weight:900; cursor:pointer;">CANCEL</button>
    </div>

    <script>
        let min = 1, max = 100, target, isGameOver = false;

        const talkBtn = document.getElementById('talk-btn'),
            statusMsg = document.getElementById('status-msg'),
            rangeDisplay = document.getElementById('range-display'),
            drawer = document.getElementById('input-drawer'),
            numInput = document.getElementById('num-input');

        function initGame() {
            min = 1; max = 100;
            target = Math.floor(Math.random() * 98) + 2;
            isGameOver = false;

            // 重置炸彈與震撼效果
            const bomb = document.getElementById('bomb-visual');
            bomb.style.display = 'none';
            bomb.style.animation = 'none';
            document.body.classList.remove('boom-mode');
            document.body.classList.remove('boom-shake');

            // 重置介面
            rangeDisplay.innerText = `${min} ~ ${max}`;
            statusMsg.innerText = "READY";
            statusMsg.style.color = "white";
            talkBtn.innerHTML = "點擊<br>說話";
            talkBtn.style.background = "linear-gradient(to bottom, #FF6699, var(--primary-candy))";
            isListening = false;

            speak("遊戲開始");
        }

        // --- 語音辨識 ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        if (recognition) {
            recognition.lang = 'zh-TW';
        }

        let isListening = false;
        let listenTimer = null; // 監控 LISTENING 階段
        let judgeTimer = null;  // 監控 JUDGING 階段

        const toggleTalk = (e) => {
            if (isGameOver) return;
            if (e) e.preventDefault();

            if (isListening) {
                stopTalk();
            } else {
                startTalk();
            }
        };

        const startTalk = () => {
            if (isGameOver) return;
            if (navigator.vibrate) navigator.vibrate(40);

            isListening = true;
            statusMsg.innerText = "LISTENING...";
            statusMsg.style.color = "white";
            talkBtn.innerHTML = "停止<br>收音";
            talkBtn.style.background = "#FF3366";

            if (listenTimer) clearTimeout(listenTimer);
            if (judgeTimer) clearTimeout(judgeTimer);

            // 10秒沒說話自動關閉
            listenTimer = setTimeout(() => {
                if (isListening) stopTalk();
            }, 10000);

            try {
                recognition.start();
            } catch (err) { console.log("Recognition already running"); }
        };

        const stopTalk = () => {
            if (isGameOver || !isListening) return;

            isListening = false;
            statusMsg.innerText = "JUDGING...";
            talkBtn.innerHTML = "點擊<br>說話";
            talkBtn.style.background = "linear-gradient(to bottom, #FF6699, var(--primary-candy))";

            if (listenTimer) clearTimeout(listenTimer);
            if (judgeTimer) clearTimeout(judgeTimer);

            judgeTimer = setTimeout(() => {
                if (statusMsg.innerText === "JUDGING...") {
                    resetStatus();
                }
            }, 2000);

            try {
                recognition.stop();
            } catch (err) { }
        };

        // 辨識成功
        recognition.onresult = (e) => {
            if (judgeTimer) clearTimeout(judgeTimer); // 成功拿到結果，清除計時器

            isListening = false;
            talkBtn.innerHTML = "點擊<br>說話";
            talkBtn.style.background = "linear-gradient(to bottom, #FF6699, var(--primary-candy))";

            const match = e.results[0][0].transcript.match(/\d+/);
            if (match) {
                handleGuess(parseInt(match[0]));
            } else {
                statusMsg.innerText = "NOT CLEAR";
                statusMsg.style.color = "#FF3399";
                setTimeout(resetStatus, 1500);
            }
        };

        // 辨識出錯（例如沒聲音）
        recognition.onerror = (e) => {
            if (judgeTimer) clearTimeout(judgeTimer);

            isListening = false;
            talkBtn.innerHTML = "點擊<br>說話";
            talkBtn.style.background = "linear-gradient(to bottom, #FF6699, var(--primary-candy))";

            console.log("辨識錯誤:", e.error);
            if (e.error === 'no-speech') {
                statusMsg.innerText = "NO SOUND";
                setTimeout(resetStatus, 1000);
            } else {
                resetStatus();
            }
        };

        // 防呆：如果語音辨識自動結束
        recognition.onend = () => {
            if (isListening) {
                isListening = false;
                talkBtn.innerHTML = "點擊<br>說話";
                talkBtn.style.background = "linear-gradient(to bottom, #FF6699, var(--primary-candy))";
                resetStatus();
            }
        };

        // 統一重置狀態的函式
        function resetStatus() {
            if (isGameOver) return;
            statusMsg.innerText = "READY";
            statusMsg.style.color = "white";
            if (judgeTimer) clearTimeout(judgeTimer);
            if (listenTimer) clearTimeout(listenTimer);
        }

        // 綁定點擊切換事件
        talkBtn.addEventListener('click', toggleTalk);

        // --- 介面控制 ---
        document.getElementById('open-type').onclick = () => { if (!isGameOver) { drawer.classList.add('active'); numInput.focus(); } };
        document.getElementById('close-drawer').onclick = () => drawer.classList.remove('active');
        document.getElementById('reset-btn').onclick = initGame;

        numInput.onkeydown = (e) => {
            if (e.key === 'Enter') {
                handleGuess(parseInt(numInput.value));
                drawer.classList.remove('active');
                numInput.value = '';
            }
        };

        // --- 核心判斷 ---
        function handleGuess(num) {
            if (num <= min || num >= max || isNaN(num)) {
                statusMsg.innerText = "INVALID!";
                statusMsg.style.color = "#FF3399";
                return;
            }
            if (num === target) {
                isGameOver = true;
                const bomb = document.getElementById('bomb-visual');
                const overlay = document.getElementById('boom-overlay');

                // 1. 啟動炸彈序列 (總長 3s)
                bomb.style.display = 'block';
                bomb.style.animation = 'bomb-sequence 3s forwards';

                statusMsg.innerText = "DANGER!!";
                statusMsg.style.color = "#FF3399";
                talkBtn.innerText = "BOOM";
                talkBtn.style.background = "#444";

                // 2. 預備爆炸 (在第 1.6 秒開始震動)
                setTimeout(() => {
                    document.body.classList.add('mega-shake-active');
                    if (navigator.vibrate) navigator.vibrate([50, 50, 50, 50]);
                }, 1600);

                // 3. 爆炸瞬間 (第 3 秒)
                setTimeout(() => {
                    document.body.classList.remove('mega-shake-active');
                    overlay.classList.add('boom-active'); // 畫面變紅
                    if (navigator.vibrate) navigator.vibrate(800); // 長震動
                    speak(num + "，爆炸了！");

                    // 4. 2 秒後慢慢淡掉
                    setTimeout(() => {
                        overlay.classList.remove('boom-active');
                        overlay.classList.add('boom-fade-out');
                    }, 500); // 爆炸視覺停留 0.5 秒後開始淡出

                    // 5. 總共延遲 5.5 秒後自動重啟
                    setTimeout(() => {
                        overlay.classList.remove('boom-fade-out');
                        initGame();
                    }, 4500);

                }, 3000);
            } else {
                num < target ? min = num : max = num;
                rangeDisplay.innerText = `${min} ~ ${max}`;
                statusMsg.innerText = "SAFE: " + num;
                statusMsg.style.color = "#00CC66";
                speak("安全，" + num);

                const circle = document.getElementById('circle');
                circle.style.transform = "scale(1.15)";
                setTimeout(() => circle.style.transform = "scale(1)", 200);
            }
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'zh-TW';
            window.speechSynthesis.speak(u);
        }

        initGame();

        const submitBtn = document.getElementById('submit-num');

        // 封裝一個統一的送出函式
        function confirmInput() {
            const val = parseInt(numInput.value);
            if (!isNaN(val)) {
                handleGuess(val);
                drawer.classList.remove('active');
                numInput.value = '';
                // 收起手機虛擬鍵盤
                numInput.blur();
            } else {
                // 如果沒輸入數字就點 OK，可以給個微弱震動提示
                if (navigator.vibrate) navigator.vibrate(20);
            }
        }

        // 綁定按鈕點擊
        submitBtn.onclick = confirmInput;

        // 綁定 Enter 鍵 (包含手機鍵盤的「前往/搜尋/完成」)
        numInput.onkeydown = (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // 防止網頁重整
                confirmInput();
            }
        };

        // 額外保險：部分安卓手機會觸發 oninput 而非 onkeydown
        numInput.addEventListener('keypress', (e) => {
            if (e.which === 13) {
                confirmInput();
            }
        });
    </script>
</body>

</html>
