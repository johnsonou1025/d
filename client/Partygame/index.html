<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Party Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Inter:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-green: #3DFF8B;
            --neon-purple: #BF00FF;
            --neon-blue: #4D97FF;
            --bg-dark: #0D0D0D;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background: radial-gradient(circle at center, #1a1a2e 0%, #0d0d0d 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 50px 0 30px 0;
        }

        h1 {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, var(--neon-green), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 自適應網格：核心邏輯 */
        .game-grid {
            display: grid;
            /* auto-fit 會根據寬度自動填滿，minmax 確保按鈕最小 100px，最大平均分配 */
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            /* 限制最大寬度，確保在電腦看時不會排成一長列，最多三列(約 360px + gap) */
            max-width: 360px;
            width: 85%;
            gap: 20px;
            justify-content: center;
            /* 內容居中 */
        }

        .game-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s;
        }

        .game-item:active {
            transform: scale(0.92);
        }

        .icon-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: white;
            margin-bottom: 10px;
            position: relative;
        }

        .game-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #eee;
            text-align: center;
        }

        /* 裝飾線 */
        .icon-box::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 35%;
            height: 4px;
            border-radius: 10px 10px 0 0;
        }

        .line-tilt::after {
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }

        .line-echo::after {
            background: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple);
        }

        .line-dobble::after {
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            /* 關鍵：確保影片不縮放變形地填滿螢幕 */
            z-index: -1;
            /* 確保影片在所有內容的最底層 */
            pointer-events: none;
            /* 確保點擊操作會穿透影片，點到按鈕 */

            /* 視覺優化：調暗背景，讓按鈕文字更清晰 */
            filter: brightness(0.5);
            opacity: 0.8;
        }

        /* 確保內容容器在影片上方，並具有一點穿透感 */
        header,
        .game-grid {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>
    <!-- 自動播放、循環、靜音、不顯示控制項、且針對 iOS 優化 -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="home-video.mp4" type="video/mp4">
        您的瀏覽器不支援 HTML5 影片。
    </video>

    <header>
        <h1>Party Hub</h1>
        <div style="font-size: 0.6rem; color: #555; letter-spacing: 2px; margin-top: 5px;">SELECT YOUR GAME</div>
    </header>

    <div class="game-grid">
        <!-- 遊戲 1: TiltGuess -->
        <a href="Tiltguess.html" class="game-item">
            <div class="icon-box line-tilt">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M17.25 20.5H10.5q-1.05 0-1.775-.725T8 18V6q0-1.05.725-1.775T10.5 3.5h6.75q1.05 0 1.775.725T19.75 6v12q0 1.05-.725 1.775T17.25 20.5M10.5 18h6.75V6H10.5zM4.25 15.5v-2h2v-2h-2v-2l-3 3zM22.75 11.5l-3-3v2h-2v2h2v2z">
                    </path>
                </svg>
            </div>
            <div class="game-label">TiltGuess</div>
        </a>

        <!-- 遊戲 2: EchoBoom -->
        <a href="Echoboom.html" class="game-item">
            <div class="icon-box line-echo">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M11.5 22q-2.325 0-4.137-1.288T5.1 18.15l1.4-1.425q1.15 1.8 2.988 2.763T13.5 20q.55 0 1.075-.113t1.025-.337l-1.425-1.425q-.35.125-.725.175T12.5 18q-2.3 0-3.9-1.6T7 12.5q0-1.05.388-2.013t1.087-1.737L7.05 7.325Q6.025 8.55 5.513 9.988T5 11.5q0 3.125 2.188 5.313T12.5 19q.775 0 1.525-.175t1.425-.525l1.425 1.425q-1.1 1.025-2.537 1.638T11.5 22m8.8-8.8q0-1.5-1.012-2.713T16.5 9.25l-1.4 1.4q.95.5 1.525 1.438T17.2 14q0 .55-.112 1.075t-.338 1.025l1.425 1.425q1.025-1.1 1.638-2.537T20.3 13.2m-3.925-6.5L15.65 6L14 4.35l.725-.725q.875-.875 2.088-1.2T19.5 2q1.45 0 2.475 1.025T23 5.5q0 1.175-.325 2.388t-1.2 2.087zM19.5 7q.625 0 1.063-.437T21 5.5q0-.625-.437-1.062T19.5 4q-.625 0-1.062.438T18 5.5q0 .625.438 1.063T19.5 7M12.5 17q1.875 0 3.188-1.312T17 12.5q0-1.875-1.312-3.187T12.5 8q-1.875 0-3.187 1.313T8 12.5q0 1.875 1.313 3.188T12.5 17">
                    </path>
                </svg>
            </div>
            <div class="game-label">EchoBoom</div>
        </a>

        <!-- 遊戲 3: Reaction King -->
        <a href="Dobble.html" class="game-item">
            <div class="icon-box line-dobble">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M11 21h-1l1-7H7.5q-.5 0-.75-.375T6.5 12.5q0-.35.15-.65t.35-.5l4-7q.35-.5.9-.625t1.1.025q.35.15.575.475t.125.825l-1 5h3.5q.5 0 .75.375t.25.875q0 .35-.15.65t-.35.5l-4 7q-.35.5-.9.625T11 21">
                    </path>
                </svg>
            </div>
            <div class="game-label">Reaction King</div>
        </a>

        <!-- 未來增加遊戲只要在這裡直接貼上新的 <a> 標籤即可 -->
    </div>

    <footer style="position: fixed; bottom: 20px; color: #222; font-size: 0.5rem;">
        &copy; 2026 Party Game Collection
    </footer>

</body>

</html>
