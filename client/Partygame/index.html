<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Party Hub</title>
    <style>
        :root {
            --candy-bg-1: #FFD1FF;
            --candy-bg-2: #80D4FF;
        }

        /* 深色版型變數 */
        body.dark-theme {
            --candy-bg-1: #2E1A47;
            --candy-bg-2: #0D0518;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--candy-bg-2);
            background: radial-gradient(circle at center, var(--candy-bg-1) 0%, var(--candy-bg-2) 100%);
            color: white;
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 60px 0 30px 0;
        }

        h1 {
            font-size: 3.2rem;
            margin: 0;
            background: linear-gradient(to bottom, #FFFFFF, #FFD633, #FF9900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 0px #CC6600) drop-shadow(0px 8px 15px rgba(0, 0, 0, 0.4));
            letter-spacing: 2px;
        }

        .sub-title {
            font-size: 0.8rem;
            color: #fff;
            background: #FF3399;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #fff;
            box-shadow: 0 4px 0 #CC0066, 0 8px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
            margin-top: 15px;
            display: inline-block;
            font-weight: 900;
        }

        /* 自適應網格：核心邏輯 */
        .game-grid {
            display: grid;
            /* auto-fit 會根據寬度自動填滿，minmax 確保按鈕最小 100px，最大平均分配 */
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            /* 限制最大寬度，確保在電腦看時不會排成一長列，最多三列(約 360px + gap) */
            max-width: 360px;
            width: 85%;
            gap: 20px;
            justify-content: center;
            /* 內容居中 */
        }

        .game-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-item:active .icon-box {
            transform: translateY(6px);
        }

        .game-item:active .game-label {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #CC6600, 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .icon-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 4px solid #fff;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: white;
            margin-bottom: 0px;
            position: relative;
            transition: transform 0.1s, box-shadow 0.1s;
            z-index: 1;
        }

        .game-label {
            font-size: 0.85rem;
            font-weight: 900;
            color: white;
            background: #FF9900;
            padding: 6px 14px;
            border-radius: 20px;
            border: 2px solid #fff;
            box-shadow: 0 4px 0 #CC6600, 0 8px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            z-index: 2;
            margin-top: -15px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .line-tilt {
            background: linear-gradient(to bottom, #66FFB2, #00CC66);
            box-shadow: inset 0px 8px 15px rgba(255, 255, 255, 0.6), 0 8px 0px #00994C, 0 15px 15px rgba(0, 0, 0, 0.3);
            text-shadow: 0 4px 0 #00994C;
        }

        .game-item:active .line-tilt {
            box-shadow: inset 0px 8px 15px rgba(255, 255, 255, 0.6), 0 2px 0px #00994C, 0 5px 5px rgba(0, 0, 0, 0.3);
        }

        .line-echo {
            background: linear-gradient(to bottom, #FF99FF, #CC00CC);
            box-shadow: inset 0px 8px 15px rgba(255, 255, 255, 0.6), 0 8px 0px #990099, 0 15px 15px rgba(0, 0, 0, 0.3);
            text-shadow: 0 4px 0 #990099;
        }

        .game-item:active .line-echo {
            box-shadow: inset 0px 8px 15px rgba(255, 255, 255, 0.6), 0 2px 0px #990099, 0 5px 5px rgba(0, 0, 0, 0.3);
        }

        .line-dobble {
            background: linear-gradient(to bottom, #66CCFF, #0066CC);
            box-shadow: inset 0px 8px 15px rgba(255, 255, 255, 0.6), 0 8px 0px #004C99, 0 15px 15px rgba(0, 0, 0, 0.3);
            text-shadow: 0 4px 0 #004C99;
        }

        .game-item:active .line-dobble {
            box-shadow: inset 0px 8px 15px rgba(255, 255, 255, 0.6), 0 2px 0px #004C99, 0 5px 5px rgba(0, 0, 0, 0.3);
        }

        .line-chat {
            background: linear-gradient(to bottom, #FFD633, #FF9900);
            box-shadow: inset 0px 8px 15px rgba(255, 255, 255, 0.6), 0 8px 0px #CC6600, 0 15px 15px rgba(0, 0, 0, 0.3);
            text-shadow: 0 4px 0 #CC6600;
        }

        .game-item:active .line-chat {
            box-shadow: inset 0px 8px 15px rgba(255, 255, 255, 0.6), 0 2px 0px #CC6600, 0 5px 5px rgba(0, 0, 0, 0.3);
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            /* 關鍵：確保影片不縮放變形地填滿螢幕 */
            z-index: -1;
            /* 確保影片在所有內容的最底層 */
            pointer-events: none;
            /* 確保點擊操作會穿透影片，點到按鈕 */

            /* 視覺優化：調暗背景，讓按鈕文字更清晰 */
            filter: brightness(1.3) saturate(1.5) blur(5px);
            opacity: 0.35;
        }

        /* 深色模式下的背景影片調暗 */
        body.dark-theme #bg-video {
            filter: brightness(0.5) saturate(1.2) blur(5px);
            opacity: 0.4;
        }

        /* 確保內容容器在影片上方，並具有一點穿透感 */
        header,
        .game-grid {
            position: relative;
            z-index: 1;
        }

        /* 亮色/深色切換按鈕 */
        .theme-toggle-btn {
            position: fixed;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 3px solid #ddd;
            color: #555;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 900;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 0 #ccc, 0 8px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s, box-shadow 0.1s, background 0.3s;
            z-index: 100;
        }

        .theme-toggle-btn:active {
            transform: translate(-50%, 4px);
            box-shadow: 0 0 0 #ccc, 0 4px 5px rgba(0, 0, 0, 0.2);
        }

        body.dark-theme .theme-toggle-btn {
            background: #333;
            border-color: #555;
            color: #ddd;
            box-shadow: 0 4px 0 #111, 0 8px 10px rgba(0, 0, 0, 0.5);
        }

        body.dark-theme .theme-toggle-btn:active {
            transform: translate(-50%, 4px);
            box-shadow: 0 0 0 #111, 0 4px 5px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <!-- 自動播放、循環、靜音、不顯示控制項、且針對 iOS 優化 -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="home-video.mp4" type="video/mp4">
        您的瀏覽器不支援 HTML5 影片。
    </video>

    <header>
        <h1>Party Hub</h1>
        <div class="sub-title">SELECT YOUR GAME</div>
    </header>

    <div class="game-grid">
        <!-- 遊戲 1: TiltGuess -->
        <a href="Tiltguess.html" class="game-item">
            <div class="icon-box line-tilt">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M17.25 20.5H10.5q-1.05 0-1.775-.725T8 18V6q0-1.05.725-1.775T10.5 3.5h6.75q1.05 0 1.775.725T19.75 6v12q0 1.05-.725 1.775T17.25 20.5M10.5 18h6.75V6H10.5zM4.25 15.5v-2h2v-2h-2v-2l-3 3zM22.75 11.5l-3-3v2h-2v2h2v2z">
                    </path>
                </svg>
            </div>
            <div class="game-label">TiltGuess</div>
        </a>

        <!-- 遊戲 2: EchoBoom -->
        <a href="Echoboom.html" class="game-item">
            <div class="icon-box line-echo">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M11.5 22q-2.325 0-4.137-1.288T5.1 18.15l1.4-1.425q1.15 1.8 2.988 2.763T13.5 20q.55 0 1.075-.113t1.025-.337l-1.425-1.425q-.35.125-.725.175T12.5 18q-2.3 0-3.9-1.6T7 12.5q0-1.05.388-2.013t1.087-1.737L7.05 7.325Q6.025 8.55 5.513 9.988T5 11.5q0 3.125 2.188 5.313T12.5 19q.775 0 1.525-.175t1.425-.525l1.425 1.425q-1.1 1.025-2.537 1.638T11.5 22m8.8-8.8q0-1.5-1.012-2.713T16.5 9.25l-1.4 1.4q.95.5 1.525 1.438T17.2 14q0 .55-.112 1.075t-.338 1.025l1.425 1.425q1.025-1.1 1.638-2.537T20.3 13.2m-3.925-6.5L15.65 6L14 4.35l.725-.725q.875-.875 2.088-1.2T19.5 2q1.45 0 2.475 1.025T23 5.5q0 1.175-.325 2.388t-1.2 2.087zM19.5 7q.625 0 1.063-.437T21 5.5q0-.625-.437-1.062T19.5 4q-.625 0-1.062.438T18 5.5q0 .625.438 1.063T19.5 7M12.5 17q1.875 0 3.188-1.312T17 12.5q0-1.875-1.312-3.187T12.5 8q-1.875 0-3.187 1.313T8 12.5q0 1.875 1.313 3.188T12.5 17">
                    </path>
                </svg>
            </div>
            <div class="game-label">EchoBoom</div>
        </a>

        <!-- 遊戲 3: Reaction King -->
        <a href="Dobble.html" class="game-item">
            <div class="icon-box line-dobble">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M11 21h-1l1-7H7.5q-.5 0-.75-.375T6.5 12.5q0-.35.15-.65t.35-.5l4-7q.35-.5.9-.625t1.1.025q.35.15.575.475t.125.825l-1 5h3.5q.5 0 .75.375t.25.875q0 .35-.15.65t-.35.5l-4 7q-.35.5-.9.625T11 21">
                    </path>
                </svg>
            </div>
            <div class="game-label">Reaction King</div>
        </a>

        <!-- 遊戲 4: Chat Room -->
        <a href="Chatroom.html" class="game-item">
            <div class="icon-box line-chat">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z">
                    </path>
                </svg>
            </div>
            <div class="game-label">Chat Room</div>
        </a>

        <!-- 未來增加遊戲只要在這裡直接貼上新的 <a> 標籤即可 -->
    </div>

    <!-- 主題切換按鈕 -->
    <button class="theme-toggle-btn" id="theme-toggle-btn">🌙 深色模式</button>

    <footer
        style="position: fixed; bottom: 15px; color: #fff; font-size: 0.6rem; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 1;">
        &copy; 2026 Party Game Collection
    </footer>

    <script>
        const themeBtn = document.getElementById('theme-toggle-btn');

        if (localStorage.getItem('party-theme') === 'dark') {
            document.body.classList.add('dark-theme');
            themeBtn.innerText = '🌞 亮色模式';
        }

        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            if (document.body.classList.contains('dark-theme')) {
                themeBtn.innerText = '🌞 亮色模式';
                localStorage.setItem('party-theme', 'dark');
            } else {
                themeBtn.innerText = '🌙 深色模式';
                localStorage.setItem('party-theme', 'light');
            }
        });
    </script>
</body>

</html>
