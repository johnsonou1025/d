<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>國小數學關卡 Demo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/nes-theme.css">
</head>

<body>
    <div class="game-shell">
        <div class="grade-buttons" id="gradeButtons">
            <button class="grade-btn active" data-grade="1">一年級</button>
            <button class="grade-btn" data-grade="2">二年級</button>
            <button class="grade-btn" data-grade="3">三年級</button>
            <button class="grade-btn" data-grade="4">四年級</button>
            <button class="grade-btn" data-grade="5">五年級</button>
            <button class="grade-btn" data-grade="6">六年級</button>
        </div>
        <!-- 測試用：關卡跳轉 -->
        <div class="debug-panel" id="debugPanel">
            <label for=" levelSelect">🔧 快速跳關（測試用）：</label>
            <select id="levelSelect">
                <option value="">選擇關卡...</option>
                <optgroup label="一年級">
                    <option value="1-1">1-1 數數比較</option>
                    <option value="1-2">1-2 合成分解</option>
                    <option value="1-3">1-3 20內加法</option>
                    <option value="1-4">1-4 20內減法</option>
                    <option value="1-5">1-5 圖形辨識</option>
                    <option value="1-6">1-6 數序</option>
                    <option value="1-7">1-7 進位加法</option>
                    <option value="1-8">1-8 借位減法</option>
                    <option value="1-9">1-9 鐘面</option>
                    <option value="1-10">1-10 長度比較</option>
                </optgroup>
                <optgroup label="二年級">
                    <option value="2-1">2-1 三位數位值</option>
                    <option value="2-2">2-2 三位數加減</option>
                    <option value="2-3">2-3 乘法概念</option>
                    <option value="2-4">2-4 2・4・5・8倍數</option>
                    <option value="2-5">2-5 3・6・7・9倍數</option>
                    <option value="2-6">2-6 公里公尺</option>
                    <option value="2-7">2-7 錢幣計算</option>
                    <option value="2-8">2-8 時間加減</option>
                    <option value="2-9">2-9 分數認識</option>
                    <option value="2-10">2-10 容量比較</option>
                </optgroup>
                <optgroup label="三年級">
                    <option value="3-1">3-1 四位數加減</option>
                    <option value="3-2">3-2 兩步驟應用題</option>
                    <option value="3-3">3-3 等分除法</option>
                    <option value="3-4">3-4 包含除法</option>
                    <option value="3-5">3-5 二位數乘法</option>
                    <option value="3-6">3-6 同分母分數</option>
                    <option value="3-7">3-7 圓形性質</option>
                    <option value="3-8">3-8 公里換算</option>
                    <option value="3-9">3-9 公克公斤</option>
                    <option value="3-10">3-10 直角認識</option>
                </optgroup>
                <optgroup label="四年級：複雜運算與幾何性質">
                    <option value="4-1">4-1 四則運算規則</option>
                    <option value="4-2">4-2 三位數×二位數</option>
                    <option value="4-3">4-3 三位數÷二位數</option>
                    <option value="4-4">4-4 角度測量</option>
                    <option value="4-5">4-5 三角形分類</option>
                    <option value="4-6">4-6 平行垂直線</option>
                    <option value="4-7">4-7 二位小數加減</option>
                    <option value="4-8">4-8 長方形面積</option>
                    <option value="4-9">4-9 長方體正方體</option>
                    <option value="4-10">4-10 統計圖表</option>
                </optgroup>
                <optgroup label="五年級：因倍數與分數深化">
                    <option value="5-1">5-1 因數與倍數</option>
                    <option value="5-2">5-2 公因數公倍數</option>
                    <option value="5-3">5-3 擴分約分通分</option>
                    <option value="5-4">5-4 異分母分數</option>
                    <option value="5-5">5-5 多邊形面積</option>
                    <option value="5-6">5-6 分數乘法</option>
                    <option value="5-7">5-7 未知數列式</option>
                    <option value="5-8">5-8 線對稱圖形</option>
                    <option value="5-9">5-9 體積容積</option>
                    <option value="5-10">5-10 扇形面積</option>
                </optgroup>
                <optgroup label="六年級：比例關係與邏輯統整">
                    <option value="6-1">6-1 分數除法</option>
                    <option value="6-2">6-2 小數除法</option>
                    <option value="6-3">6-3 比值等比</option>
                    <option value="6-4">6-4 圓周面積</option>
                    <option value="6-5">6-5 速率計算</option>
                    <option value="6-6">6-6 比例尺</option>
                    <option value="6-7">6-7 百分率</option>
                    <option value="6-8">6-8 柱體體積</option>
                    <option value="6-9">6-9 基準比較量</option>
                    <option value="6-10">6-10 邏輯應用題</option>
                </optgroup>
            </select>
        </div>

        <div class="game-header">
            <div>
                <div class="unit-title" id="unitTitle">Unit 1 · 1～20 的加減</div>
                <div class="level-title" id="levelTitle">Level 1 · 加法入門</div>
            </div>
            <div class="progress-text" id="progressText">1 / 3 題</div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="question-card">
            <div class="sub-text" id="subText">請選出正確的答案</div>
            <div class="question-text" id="questionText">3 + 4 = ？</div>
            <div class="options" id="optionsContainer">
                <!-- JS 產生選項 -->
            </div>
        </div>

        <div class="footer">
            <!-- <div>正確題數：<span class="score" id="scoreText">0</span></div> -->
            <div style="display: flex; align-items: center;">
                <span class="coin-sprite"></span>
                <span>正確題數：</span>
                <span class="score" id="scoreText">0</span>
            </div>
            <div>錯誤題數：<span id="wrongText">0</span></div>
        </div>

        <button class="btn-primary" id="nextButton">下一題</button>
        <div class="modal-overlay" id="modalOverlay"
            style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center;">
            <div class="result-panel" id="resultPanel" style="display: block;">
                <h2 id="resultTitle">本關完成！</h2>
                <div class="stars" id="resultStars">★★★</div>
                <div class="result-detail" id="resultDetail">你答對 0 / 0 題</div>
                <button class="btn-primary" id="retryButton" style="margin-top: 12px;">重新挑戰</button>
                <button class="btn-primary" id="nextLevelButton"
                    style="margin-top: 8px; background: var(--luigi-green) !important;">
                    下一關
                </button>
            </div>
        </div>
    </div>
    <!-- 題目檔 -->
    <script src="js/main.js"></script>

</body>

</html>
