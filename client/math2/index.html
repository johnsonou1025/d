<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>國小數學關卡 Demo</title>
    <link rel="stylesheet" href="style.css">
    <!-- <link rel="stylesheet" href="mario-theme.css"> -->
    <!-- <link rel="stylesheet" href="animal-crossing-theme.css"> -->
</head>

<body>
    <div class="game-shell">
        <div class="grade-buttons" id="gradeButtons">
            <button class="grade-btn active" data-grade="1">一年級</button>
            <button class="grade-btn" data-grade="2">二年級</button>
            <button class="grade-btn" data-grade="3">三年級</button>
            <button class="grade-btn" data-grade="4">四年級</button>
            <button class="grade-btn" data-grade="5">五年級</button>
            <button class="grade-btn" data-grade="6">六年級</button>
        </div>
        <!-- 測試用：關卡跳轉 -->
        <div class="debug-panel" id="debugPanel" style="display: none;">
            <label for="levelSelect">🔧 快速跳關（測試用）：</label>
            <select id="levelSelect">
                <option value="">選擇關卡...</option>
                <optgroup label="一年級">
                    <option value="1-1">1-1 數數比較</option>
                    <option value="1-2">1-2 合成分解</option>
                    <option value="1-3">1-3 20內加法</option>
                    <option value="1-4">1-4 20內減法</option>
                    <option value="1-5">1-5 圖形辨識</option>
                    <option value="1-6">1-6 數序</option>
                    <option value="1-7">1-7 進位加法</option>
                    <option value="1-8">1-8 借位減法</option>
                    <option value="1-9">1-9 鐘面</option>
                    <option value="1-10">1-10 長度比較</option>
                </optgroup>
                <optgroup label="二年級">
                    <option value="2-1">2-1</option>
                    <option value="2-2">2-2</option>
                    <option value="2-3">2-3</option>
                    <option value="2-4">2-4</option>
                    <option value="2-5">2-5</option>
                    <option value="2-6">2-6</option>
                    <option value="2-7">2-7</option>
                    <option value="2-8">2-8</option>
                    <option value="2-9">2-9</option>
                    <option value="2-10">2-10</option>
                </optgroup>
            </select>
        </div>

        <div class="game-header">
            <div>
                <div class="unit-title" id="unitTitle">Unit 1 · 1～20 的加減</div>
                <div class="level-title" id="levelTitle">Level 1 · 加法入門</div>
            </div>
            <div class="progress-text" id="progressText">1 / 3 題</div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="question-card">
            <div class="sub-text" id="subText">請選出正確的答案</div>
            <div class="question-text" id="questionText">3 + 4 = ？</div>
            <div class="options" id="optionsContainer">
                <!-- JS 產生選項 -->
            </div>
        </div>

        <div class="footer">
            <div>正確題數：<span class="score" id="scoreText">0</span></div>
            <div>錯誤題數：<span id="wrongText">0</span></div>
        </div>

        <button class="btn-primary" id="nextButton">下一題</button>

        <div class="result-panel" id="resultPanel">
            <h2 id="resultTitle">本關完成！</h2>
            <div class="stars" id="resultStars">★★★</div>
            <div class="result-detail" id="resultDetail">你答對 0 / 0 題</div>
            <button class="btn-primary" id="retryButton" style="margin-top: 12px;">重新挑戰</button>
            <button class="btn-primary" id="nextLevelButton"
                style="margin-top: 8px; background: linear-gradient(90deg, #38bdf8, #0ea5e9);">
                下一關
            </button>
        </div>
    </div>
    <!-- 題目檔 -->
    <script src="js/levels/1-1.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
