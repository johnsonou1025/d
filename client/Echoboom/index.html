<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EchoBoom - Bomb Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Inter:wght@400;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-purple: #7B61FF;
            --secondary-pink: #FF4D97;
            --neon-green: #3DFF8B;
            --dark-bg: #1A1A2E;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 20%, #2E2E5E 0%, #1A1A2E 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            transition: background 0.3s;
        }

        /* 頂部資訊 */
        .header {
            width: 90%;
            padding: 25px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .room-id {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .settings-icon {
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.8;
        }

        /* 中央遊戲看板 */
        .stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .number-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 6px solid var(--primary-purple);
            box-shadow: 0 0 30px var(--primary-purple), inset 0 0 20px var(--primary-purple);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }
        }

        .range-text {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 2.5rem;
            margin: 0;
        }

        .range-label {
            font-size: 0.75rem;
            color: #888;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .status-popup {
            margin-top: 40px;
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 炸彈視覺特效 */
        #bomb-visual {
            position: fixed;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8rem;
            z-index: 200;
            pointer-events: none;
            display: none;
        }

        @keyframes bomb-drop {
            0% {
                top: -150px;
                transform: translateX(-50%) scale(0.5);
            }

            60% {
                top: 40%;
                transform: translateX(-50%) scale(1.2);
            }

            80% {
                top: 40%;
                transform: translateX(-50%) scale(1.1);
                filter: drop-shadow(0 0 20px red);
            }

            100% {
                top: 40%;
                transform: translateX(-50%) scale(3);
                opacity: 0;
                filter: drop-shadow(0 0 50px white);
            }
        }

        /* 爆炸震撼效果 */
        .boom-mode {
            background: #400 !important;
        }

        .boom-shake {
            animation: intense-shake 0.1s infinite;
        }

        @keyframes intense-shake {
            0% {
                transform: translate(5px, 5px) rotate(1deg);
            }

            50% {
                transform: translate(-5px, -5px) rotate(-1deg);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        /* 底部操作 */
        .footer {
            width: 100%;
            padding-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .btn-3d {
            border: none;
            cursor: pointer;
            color: white;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .main-talk-btn {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(145deg, #8A72FF, #6A4DFF);
            box-shadow: 0 8px 0 #4A32BB, 0 12px 25px rgba(0, 0, 0, 0.4);
            font-size: 1.1rem;
        }

        .main-talk-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #4A32BB;
        }

        .side-btn {
            width: 65px;
            height: 65px;
            border-radius: 20px;
            background: #2a2a40;
            box-shadow: 0 5px 0 #111;
            font-size: 0.75rem;
            color: #ccc;
        }

        .side-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #111;
        }

        /* 輸入抽屜 */
        .drawer {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: #252545;
            border-top: 2px solid var(--primary-purple);
            border-radius: 30px 30px 0 0;
            padding: 40px 0;
            transition: bottom 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .drawer.active {
            bottom: 0;
        }

        .drawer-input {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--primary-purple);
            border-radius: 15px;
            color: var(--neon-green);
            font-size: 4rem;
            width: 220px;
            text-align: center;
            font-family: 'ZCOOL KuaiLe', sans-serif;
            outline: none;
        }

        /* 炸彈掉落與蓄力動畫 (總長 3s) */
        @keyframes bomb-sequence {
            0% {
                top: -150px;
                transform: translateX(-50%) scale(0.5);
                opacity: 1;
            }

            20% {
                top: 40%;
                transform: translateX(-50%) scale(1);
            }

            /* 0.6s 掉到中間 */
            53% {
                top: 40%;
                transform: translateX(-50%) scale(1);
            }

            /* 停頓約 1s */
            55% {
                top: 40%;
                transform: translateX(-50%) scale(1.05);
            }

            /* 開始震動放大 */
            85% {
                top: 40%;
                transform: translateX(-50%) scale(1.5);
                filter: drop-shadow(0 0 30px red);
            }

            100% {
                top: 40%;
                transform: translateX(-50%) scale(4);
                opacity: 0;
                filter: drop-shadow(0 0 60px white);
            }
        }

        /* 爆炸後紅色覆蓋層 */
        .boom-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--secondary-pink);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
        }

        /* 爆炸瞬間變紅 */
        .boom-active {
            opacity: 1;
        }

        /* 2秒慢慢淡掉 */
        .boom-fade-out {
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* 強化的劇烈震動 (對應炸彈放大時) */
        @keyframes mega-shake {
            0% {
                transform: translate(5px, 5px);
            }

            25% {
                transform: translate(-5px, 5px);
            }

            50% {
                transform: translate(5px, -5px);
            }

            75% {
                transform: translate(-5px, -5px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        .mega-shake-active {
            animation: mega-shake 0.1s infinite;
        }
    </style>
</head>

<body>
    <div id="boom-overlay" class="boom-overlay"></div>
    <div id="bomb-visual">💣</div>

    <div class="header">
        <div class="room-id">ID: 888 666</div>
        <div class="settings-icon">⚙️</div>
    </div>

    <div class="stage">
        <div class="number-circle" id="circle">
            <p class="range-label">RANGE</p>
            <h1 class="range-text" id="range-display">1 ~ 100</h1>
        </div>
        <div id="status-msg" class="status-popup">READY</div>
    </div>

    <div class="footer">
        <button class="btn-3d side-btn" id="open-type">鍵盤</button>
        <button class="btn-3d main-talk-btn" id="talk-btn">按住<br>說話</button>
        <button class="btn-3d side-btn" id="reset-btn">開</button>
    </div>

    <div class="drawer" id="input-drawer">
        <p style="color: #888; margin-bottom: 15px; letter-spacing: 2px;">請輸入數字</p>
        <input type="number" class="drawer-input" id="num-input" pattern="\d*">
        <button id="close-drawer"
            style="background:none; border:none; color:#666; margin-top:30px; font-weight:900; cursor:pointer;">CANCEL</button>
    </div>

    <script>
        let min = 1, max = 100, target, isGameOver = false;

        const talkBtn = document.getElementById('talk-btn'),
            statusMsg = document.getElementById('status-msg'),
            rangeDisplay = document.getElementById('range-display'),
            drawer = document.getElementById('input-drawer'),
            numInput = document.getElementById('num-input');

        function initGame() {
            min = 1; max = 100;
            target = Math.floor(Math.random() * 98) + 2;
            isGameOver = false;

            // 重置炸彈與震撼效果
            const bomb = document.getElementById('bomb-visual');
            bomb.style.display = 'none';
            bomb.style.animation = 'none';
            document.body.classList.remove('boom-mode');
            document.body.classList.remove('boom-shake');

            // 重置介面
            rangeDisplay.innerText = `${min} ~ ${max}`;
            statusMsg.innerText = "READY";
            statusMsg.style.color = "white";
            talkBtn.innerText = "HOLD\nTALK";
            talkBtn.style.background = "linear-gradient(145deg, #8A72FF, #6A4DFF)";

            speak("遊戲開始");
        }

        // --- 語音辨識 ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        if (recognition) {
            recognition.lang = 'zh-TW';
            recognition.onresult = (e) => {
                const match = e.results[0][0].transcript.match(/\d+/);
                if (match) handleGuess(parseInt(match[0]));
            };
        }

        let listenTimer = null; // 監控 LISTENING 階段
        let judgeTimer = null;  // 監控 JUDGING 階段

        const startTalk = (e) => {
            if (isGameOver) return;
            e.preventDefault();
            if (navigator.vibrate) navigator.vibrate(40);

            statusMsg.innerText = "LISTENING...";
            statusMsg.style.color = "white";

            // 5秒沒說話自動關閉
            if (listenTimer) clearTimeout(listenTimer);
            listenTimer = setTimeout(() => {
                if (statusMsg.innerText === "LISTENING...") {
                    recognition.stop();
                    resetStatus();
                }
            }, 5000);

            try {
                recognition.start();
            } catch (err) { console.log("Recognition already running"); }
        };

        const stopTalk = (e) => {
            if (isGameOver) return;
            e.preventDefault();

            if (listenTimer) clearTimeout(listenTimer);

            // 進入判斷階段
            statusMsg.innerText = "JUDGING...";

            // --- 關鍵修正：如果 JUDGING 卡住超過 2 秒，強制重置 ---
            if (judgeTimer) clearTimeout(judgeTimer);
            judgeTimer = setTimeout(() => {
                if (statusMsg.innerText === "JUDGING...") {
                    console.log("判斷超時，強制重置");
                    resetStatus();
                }
            }, 2000);

            setTimeout(() => { recognition.stop(); }, 400);
        };

        // 辨識成功
        recognition.onresult = (e) => {
            if (judgeTimer) clearTimeout(judgeTimer); // 成功拿到結果，清除計時器
            const match = e.results[0][0].transcript.match(/\d+/);
            if (match) {
                handleGuess(parseInt(match[0]));
            } else {
                statusMsg.innerText = "NOT CLEAR";
                statusMsg.style.color = "var(--secondary-pink)";
                setTimeout(resetStatus, 1500);
            }
        };

        // 辨識出錯（例如沒聲音）
        recognition.onerror = (e) => {
            if (judgeTimer) clearTimeout(judgeTimer);
            console.log("辨識錯誤:", e.error);
            if (e.error === 'no-speech') {
                statusMsg.innerText = "NO SOUND";
                setTimeout(resetStatus, 1000);
            }
        };

        // 統一重置狀態的函式
        function resetStatus() {
            if (isGameOver) return;
            statusMsg.innerText = "READY";
            statusMsg.style.color = "white";
            if (judgeTimer) clearTimeout(judgeTimer);
            if (listenTimer) clearTimeout(listenTimer);
        }

        talkBtn.addEventListener('mousedown', startTalk);
        talkBtn.addEventListener('mouseup', stopTalk);
        talkBtn.addEventListener('touchstart', startTalk);
        talkBtn.addEventListener('touchend', stopTalk);

        // --- 介面控制 ---
        document.getElementById('open-type').onclick = () => { if (!isGameOver) { drawer.classList.add('active'); numInput.focus(); } };
        document.getElementById('close-drawer').onclick = () => drawer.classList.remove('active');
        document.getElementById('reset-btn').onclick = initGame;

        numInput.onkeydown = (e) => {
            if (e.key === 'Enter') {
                handleGuess(parseInt(numInput.value));
                drawer.classList.remove('active');
                numInput.value = '';
            }
        };

        // --- 核心判斷 ---
        function handleGuess(num) {
            if (num <= min || num >= max || isNaN(num)) {
                statusMsg.innerText = "INVALID!";
                statusMsg.style.color = "#FF4D97";
                return;
            }
            if (num === target) {
                isGameOver = true;
                const bomb = document.getElementById('bomb-visual');
                const overlay = document.getElementById('boom-overlay');

                // 1. 啟動炸彈序列 (總長 3s)
                bomb.style.display = 'block';
                bomb.style.animation = 'bomb-sequence 3s forwards';

                statusMsg.innerText = "DANGER!!";
                statusMsg.style.color = "var(--secondary-pink)";
                talkBtn.innerText = "BOOM";
                talkBtn.style.background = "#444";

                // 2. 預備爆炸 (在第 1.6 秒開始震動)
                setTimeout(() => {
                    document.body.classList.add('mega-shake-active');
                    if (navigator.vibrate) navigator.vibrate([50, 50, 50, 50]);
                }, 1600);

                // 3. 爆炸瞬間 (第 3 秒)
                setTimeout(() => {
                    document.body.classList.remove('mega-shake-active');
                    overlay.classList.add('boom-active'); // 畫面變紅
                    if (navigator.vibrate) navigator.vibrate(800); // 長震動
                    speak(num + "，爆炸了！");

                    // 4. 2 秒後慢慢淡掉
                    setTimeout(() => {
                        overlay.classList.remove('boom-active');
                        overlay.classList.add('boom-fade-out');
                    }, 500); // 爆炸視覺停留 0.5 秒後開始淡出

                    // 5. 總共延遲 5.5 秒後自動重啟
                    setTimeout(() => {
                        overlay.classList.remove('boom-fade-out');
                        initGame();
                    }, 4500);

                }, 3000);
            } else {
                num < target ? min = num : max = num;
                rangeDisplay.innerText = `${min} ~ ${max}`;
                statusMsg.innerText = "SAFE: " + num;
                statusMsg.style.color = "#3DFF8B";
                speak("安全，" + num);

                const circle = document.getElementById('circle');
                circle.style.transform = "scale(1.15)";
                setTimeout(() => circle.style.transform = "scale(1)", 200);
            }
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'zh-TW';
            window.speechSynthesis.speak(u);
        }

        initGame();
    </script>
</body>

</html>
